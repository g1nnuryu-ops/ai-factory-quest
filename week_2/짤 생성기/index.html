<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>짤 생성기 — 밈 메이커</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --line: #e6e8eb;
    --ink: #1a1d21;
    --muted: #8b9099;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
  header p { margin-top: 6px; color: var(--muted); font-size: 14px; }

  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    width: 100%;
    max-width: 1020px;
    align-items: start;
  }
  @media (max-width: 820px) { .app { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.04);
  }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #41454c;
  }

  input[type="text"], select {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    background: #fafbfc;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    background: #fff;
  }
  input::placeholder { color: #b5bac1; }

  .upload {
    border: 2px dashed var(--line);
    border-radius: 12px;
    padding: 26px 16px;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    transition: border-color .15s, background .15s, color .15s;
  }
  .upload:hover, .upload.drag {
    border-color: var(--accent);
    background: #f5f4ff;
    color: var(--accent);
  }
  .upload strong { color: var(--accent); font-weight: 700; }
  .upload .icon { font-size: 28px; display: block; margin-bottom: 8px; }
  #fileInput { display: none; }

  .divider { height: 1px; background: var(--line); margin: 20px 0; }

  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title span { font-size: 13px; font-weight: 700; color: #41454c; }

  .btn-add {
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    padding: 7px 12px;
    border: 1px solid var(--accent);
    background: #f5f4ff;
    color: var(--accent);
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-add:hover { background: #ebe9ff; }

  /* 텍스트 레이어 목록 */
  .text-list { display: flex; flex-direction: column; gap: 8px; }
  .empty-list {
    font-size: 13px; color: var(--muted); text-align: center;
    padding: 14px; background: #fafbfc; border-radius: 10px;
    border: 1px dashed var(--line);
  }
  .text-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px; border: 1px solid var(--line);
    border-radius: 10px; background: #fafbfc;
    transition: border-color .15s, background .15s;
  }
  .text-item.selected {
    border-color: var(--accent);
    background: #f5f4ff;
    box-shadow: 0 0 0 2px rgba(79,70,229,0.1);
  }
  .text-item .grip { color: var(--muted); font-size: 13px; cursor: pointer; user-select: none; }
  .text-item input { flex: 1; border-radius: 8px; padding: 8px 10px; }
  .item-del {
    border: none; background: transparent; color: var(--muted);
    font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 6px;
    line-height: 1;
  }
  .item-del:hover { background: #ffe4e4; color: #e23b3b; }

  /* 선택 텍스트 옵션 */
  .options { margin-top: 18px; transition: opacity .15s; }
  .options.disabled { opacity: .4; pointer-events: none; }

  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }

  .slider-head { display: flex; justify-content: space-between; align-items: baseline; }
  .slider-head .val { color: var(--accent); font-weight: 700; font-size: 13px; }

  input[type="range"] {
    width: 100%; margin-top: 6px; accent-color: var(--accent); cursor: pointer;
  }

  input[type="color"] {
    width: 100%; height: 38px;
    border: 1px solid var(--line); border-radius: 8px;
    padding: 2px; background: #fff; cursor: pointer;
  }

  button.btn-download {
    width: 100%;
    font-family: inherit; font-size: 15px; font-weight: 700;
    padding: 13px; border: none; border-radius: 10px;
    cursor: pointer; background: var(--accent); color: #fff;
    margin-top: 20px; transition: background .15s, transform .05s;
  }
  button.btn-download:hover { background: var(--accent-hover); }
  button.btn-download:active { transform: translateY(1px); }
  button.btn-download:disabled { background: #c7c9ce; cursor: not-allowed; }

  /* 미리보기 */
  .preview {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.04);
    display: flex; align-items: center; justify-content: center;
    min-height: 420px; position: sticky; top: 20px;
  }
  .canvas-wrap {
    width: 100%; display: flex; flex-direction: column;
    align-items: center; gap: 14px;
  }
  canvas {
    max-width: 100%; border-radius: 10px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.12); display: none;
    touch-action: none;
  }
  .empty { text-align: center; color: var(--muted); }
  .empty .big { font-size: 44px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  .drag-hint {
    display: none; font-size: 12px; color: var(--muted);
    background: #f5f4ff; border: 1px solid #e4e2ff;
    padding: 7px 12px; border-radius: 999px;
  }

  footer { margin-top: 26px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <header>
    <h1>🖼️ 짤 생성기</h1>
    <p>이미지에 텍스트를 자유롭게 올리고, 끌어서 옮기고 회전하세요</p>
  </header>

  <div class="app">
    <!-- 컨트롤 -->
    <div class="panel">
      <div class="field">
        <label>이미지</label>
        <div class="upload" id="dropZone">
          <span class="icon">📁</span>
          <span id="uploadText"><strong>클릭</strong>하거나 이미지를 끌어다 놓으세요</span>
        </div>
        <input type="file" id="fileInput" accept="image/*">
      </div>

      <div class="divider"></div>

      <div class="section-title">
        <span>텍스트 레이어</span>
        <button class="btn-add" id="addBtn">+ 텍스트 추가</button>
      </div>
      <div class="text-list" id="textList">
        <div class="empty-list">텍스트를 추가하면 여기에 나타나요</div>
      </div>

      <!-- 선택한 텍스트 옵션 -->
      <div class="options disabled" id="options">
        <div class="divider"></div>

        <div class="field">
          <div class="slider-head">
            <label style="margin:0">글자 크기</label>
            <span class="val" id="sizeVal">8%</span>
          </div>
          <input type="range" id="fontSize" min="3" max="20" value="8" step="0.5">
        </div>

        <div class="field">
          <div class="slider-head">
            <label style="margin:0">회전</label>
            <span class="val" id="rotVal" title="클릭하면 0°로 초기화" style="cursor:pointer">0°</span>
          </div>
          <input type="range" id="rotation" min="-180" max="180" value="0" step="1">
        </div>

        <div class="row">
          <div class="field">
            <label>글자 색</label>
            <input type="color" id="fillColor" value="#ffffff">
          </div>
          <div class="field">
            <label>테두리 색</label>
            <input type="color" id="strokeColor" value="#000000">
          </div>
        </div>

        <div class="field">
          <label>폰트</label>
          <select id="fontFamily">
            <option value="Anton">Anton (밈 클래식)</option>
            <option value="'Noto Sans KR'">Noto Sans KR (한글)</option>
            <option value="Impact">Impact</option>
          </select>
        </div>
      </div>

      <button class="btn-download" id="downloadBtn" disabled>⬇️ 이미지 다운로드</button>
    </div>

    <!-- 미리보기 -->
    <div class="preview">
      <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
        <div class="drag-hint" id="dragHint">✋ 텍스트를 클릭해 선택하고, 끌어서 옮기세요</div>
        <div class="empty" id="empty">
          <div class="big">🎨</div>
          <p>이미지를 업로드하면<br>여기에 미리보기가 나타나요</p>
        </div>
      </div>
    </div>
  </div>

  <footer>Canvas로 만든 짤 생성기 · 모든 처리는 브라우저에서 진행됩니다</footer>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const uploadText = document.getElementById('uploadText');
  const addBtn = document.getElementById('addBtn');
  const textList = document.getElementById('textList');
  const options = document.getElementById('options');
  const fontSizeInput = document.getElementById('fontSize');
  const sizeVal = document.getElementById('sizeVal');
  const rotationInput = document.getElementById('rotation');
  const rotVal = document.getElementById('rotVal');
  const fillColor = document.getElementById('fillColor');
  const strokeColor = document.getElementById('strokeColor');
  const fontFamily = document.getElementById('fontFamily');
  const downloadBtn = document.getElementById('downloadBtn');
  const empty = document.getElementById('empty');
  const dragHint = document.getElementById('dragHint');

  let img = null;
  let texts = [];           // { id, text, x, y, size, rotation, fill, stroke, font }
  let selectedId = null;
  let nextId = 1;
  const boxes = {};         // id -> { cx, cy, halfW, halfH } (캔버스 픽셀 좌표)

  // ---- 이미지 불러오기 ----
  function loadImage(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const image = new Image();
      image.onload = () => {
        img = image;
        uploadText.innerHTML = '✅ ' + file.name;
        empty.style.display = 'none';
        canvas.style.display = 'block';
        dragHint.style.display = 'block';
        downloadBtn.disabled = false;
        if (texts.length === 0) addText('텍스트');
        else draw();
      };
      image.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => loadImage(e.target.files[0]));
  ['dragenter', 'dragover'].forEach(evt =>
    dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.add('drag'); }));
  ['dragleave', 'drop'].forEach(evt =>
    dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.remove('drag'); }));
  dropZone.addEventListener('drop', (e) => {
    if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]);
  });

  // ---- 텍스트 레이어 관리 ----
  function addText(value) {
    const t = {
      id: nextId++,
      text: value || '텍스트',
      x: 0.5,
      y: texts.length === 0 ? 0.15 : 0.5,
      size: 8,
      rotation: 0,
      fill: '#ffffff',
      stroke: '#000000',
      font: 'Anton'
    };
    texts.push(t);
    selectedId = t.id;
    renderList();
    syncControls();
    draw();
  }

  function deleteText(id) {
    texts = texts.filter(t => t.id !== id);
    delete boxes[id];
    if (selectedId === id) selectedId = texts.length ? texts[texts.length - 1].id : null;
    renderList();
    syncControls();
    draw();
  }

  // 선택만 바꿀 때는 목록을 다시 그리지 않고 강조만 갱신
  // (입력창을 새로 만들면 포커스가 풀려 타이핑이 안 되기 때문)
  function selectText(id) {
    selectedId = id;
    Array.from(textList.children).forEach(row => {
      row.classList.toggle('selected', Number(row.dataset.id) === id);
    });
    syncControls();
    draw();
  }

  function getSelected() {
    return texts.find(t => t.id === selectedId) || null;
  }

  // 옵션 컨트롤을 선택된 텍스트 값으로 동기화
  function syncControls() {
    const t = getSelected();
    if (!t) {
      options.classList.add('disabled');
      return;
    }
    options.classList.remove('disabled');
    fontSizeInput.value = t.size;
    sizeVal.textContent = t.size + '%';
    rotationInput.value = t.rotation;
    rotVal.textContent = t.rotation + '°';
    fillColor.value = t.fill;
    strokeColor.value = t.stroke;
    fontFamily.value = t.font;
  }

  // 레이어 목록 UI 다시 그리기
  function renderList() {
    textList.innerHTML = '';
    if (texts.length === 0) {
      textList.innerHTML = '<div class="empty-list">텍스트를 추가하면 여기에 나타나요</div>';
      return;
    }
    texts.forEach(t => {
      const row = document.createElement('div');
      row.className = 'text-item' + (t.id === selectedId ? ' selected' : '');
      row.dataset.id = t.id;

      const grip = document.createElement('span');
      grip.className = 'grip';
      grip.textContent = '☰';

      const input = document.createElement('input');
      input.type = 'text';
      input.value = t.text;
      input.placeholder = '문구 입력';
      input.addEventListener('focus', () => selectText(t.id));
      input.addEventListener('input', () => { t.text = input.value; draw(); });

      const del = document.createElement('button');
      del.className = 'item-del';
      del.textContent = '×';
      del.title = '삭제';
      del.addEventListener('click', (e) => { e.stopPropagation(); deleteText(t.id); });

      row.appendChild(grip);
      row.appendChild(input);
      row.appendChild(del);
      row.addEventListener('mousedown', (e) => {
        if (e.target !== input) selectText(t.id);
      });
      textList.appendChild(row);
    });
  }

  addBtn.addEventListener('click', () => {
    if (!img) { alert('먼저 이미지를 업로드하세요.'); return; }
    addText('텍스트');
  });

  // 옵션 컨트롤 → 선택된 텍스트 반영
  fontSizeInput.addEventListener('input', () => {
    const t = getSelected(); if (!t) return;
    t.size = parseFloat(fontSizeInput.value);
    sizeVal.textContent = t.size + '%';
    draw();
  });
  // 슬라이더가 0°·±90°·±180° 근처면 정확히 그 값으로 스냅
  function snapAngle(v) {
    const snaps = [-180, -90, 0, 90, 180];
    for (const s of snaps) {
      if (Math.abs(v - s) <= 4) return s;
    }
    return v;
  }
  rotationInput.addEventListener('input', () => {
    const t = getSelected(); if (!t) return;
    t.rotation = snapAngle(parseInt(rotationInput.value));
    rotationInput.value = t.rotation;   // 슬라이더 손잡이도 스냅된 위치로
    rotVal.textContent = t.rotation + '°';
    draw();
  });
  rotVal.addEventListener('click', () => {
    const t = getSelected(); if (!t) return;
    t.rotation = 0;
    rotationInput.value = 0;
    rotVal.textContent = '0°';
    draw();
  });
  fillColor.addEventListener('input', () => {
    const t = getSelected(); if (!t) return;
    t.fill = fillColor.value; draw();
  });
  strokeColor.addEventListener('input', () => {
    const t = getSelected(); if (!t) return;
    t.stroke = strokeColor.value; draw();
  });
  fontFamily.addEventListener('change', () => {
    const t = getSelected(); if (!t) return;
    t.font = fontFamily.value; draw();
  });

  // ---- 캔버스 그리기 ----
  function draw() {
    if (!img) return;
    const maxW = 1000;
    let w = img.width, h = img.height;
    if (w > maxW) { h = h * (maxW / w); w = maxW; }
    canvas.width = w;
    canvas.height = h;
    ctx.drawImage(img, 0, 0, w, h);

    for (const k in boxes) delete boxes[k];
    texts.forEach(t => drawTextItem(t, w, h));
  }

  function drawTextItem(t, w, h) {
    const fontPx = Math.round((t.size / 100) * w);
    ctx.font = `900 ${fontPx}px ${t.font}, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineJoin = 'round';

    const text = (t.text || '').toUpperCase();
    const lines = text.trim() ? wrapText(text, w * 0.92) : [''];
    const lineHeight = fontPx * 1.1;
    const blockH = lineHeight * lines.length;
    let maxLineW = 0;
    lines.forEach(l => maxLineW = Math.max(maxLineW, ctx.measureText(l).width));

    const cx = t.x * w, cy = t.y * h;
    const rad = t.rotation * Math.PI / 180;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rad);

    ctx.fillStyle = t.fill;
    ctx.strokeStyle = t.stroke;
    ctx.lineWidth = Math.max(2, fontPx * 0.08);
    lines.forEach((line, i) => {
      const y = -blockH / 2 + lineHeight * (i + 0.5);
      ctx.strokeText(line, 0, y);
      ctx.fillText(line, 0, y);
    });

    // 선택 표시 (점선 박스)
    if (t.id === selectedId) {
      const pad = Math.max(fontPx * 0.15, 6);
      const bw = Math.max(maxLineW, fontPx) + pad * 2;
      ctx.strokeStyle = '#4f46e5';
      ctx.lineWidth = Math.max(1.5, fontPx * 0.025);
      ctx.setLineDash([fontPx * 0.25, fontPx * 0.18]);
      ctx.strokeRect(-bw / 2, -blockH / 2 - pad, bw, blockH + pad * 2);
      ctx.setLineDash([]);
    }
    ctx.restore();

    boxes[t.id] = { cx, cy, halfW: Math.max(maxLineW, fontPx) / 2, halfH: blockH / 2 };
  }

  function wrapText(text, maxWidth) {
    const words = text.split(' ');
    const lines = [];
    let current = '';
    for (const word of words) {
      const test = current ? current + ' ' + word : word;
      if (ctx.measureText(test).width > maxWidth && current) {
        lines.push(current);
        current = word;
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);
    return lines;
  }

  // ---- 텍스트 드래그 ----
  let dragId = null;
  const dragOffset = { x: 0, y: 0 };

  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const pt = e.touches ? e.touches[0] : e;
    return {
      x: (pt.clientX - rect.left) * (canvas.width / rect.width),
      y: (pt.clientY - rect.top) * (canvas.height / rect.height)
    };
  }

  // 회전을 고려한 히트 테스트 (위에 그려진 것 우선)
  function hitTest(p) {
    for (let i = texts.length - 1; i >= 0; i--) {
      const t = texts[i];
      const b = boxes[t.id];
      if (!b) continue;
      const dx = p.x - b.cx, dy = p.y - b.cy;
      const rad = -t.rotation * Math.PI / 180;
      const lx = dx * Math.cos(rad) - dy * Math.sin(rad);
      const ly = dx * Math.sin(rad) + dy * Math.cos(rad);
      if (Math.abs(lx) <= b.halfW && Math.abs(ly) <= b.halfH) return t.id;
    }
    return null;
  }

  function startDrag(e) {
    if (!img) return;
    const p = getCanvasPos(e);
    const id = hitTest(p);
    if (id === null) return;
    if (id !== selectedId) selectText(id);
    dragId = id;
    dragOffset.x = p.x - boxes[id].cx;
    dragOffset.y = p.y - boxes[id].cy;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  }

  function moveDrag(e) {
    if (dragId === null) {
      if (img) canvas.style.cursor = hitTest(getCanvasPos(e)) ? 'grab' : 'default';
      return;
    }
    const t = texts.find(x => x.id === dragId);
    if (!t) return;
    const p = getCanvasPos(e);
    t.x = Math.min(1, Math.max(0, (p.x - dragOffset.x) / canvas.width));
    t.y = Math.min(1, Math.max(0, (p.y - dragOffset.y) / canvas.height));
    draw();
    e.preventDefault();
  }

  function endDrag() { dragId = null; }

  canvas.addEventListener('mousedown', startDrag);
  window.addEventListener('mousemove', moveDrag);
  window.addEventListener('mouseup', endDrag);
  canvas.addEventListener('touchstart', startDrag, { passive: false });
  canvas.addEventListener('touchmove', moveDrag, { passive: false });
  window.addEventListener('touchend', endDrag);

  // ---- 다운로드 ----
  downloadBtn.addEventListener('click', () => {
    if (!img) return;
    // 다운로드 시 선택 점선이 안 보이도록 잠시 선택 해제 후 렌더
    const keep = selectedId;
    selectedId = null;
    draw();
    const url = canvas.toDataURL('image/png');
    selectedId = keep;
    draw();

    const a = document.createElement('a');
    a.download = 'meme.png';
    a.href = url;
    a.click();
  });
</script>
</body>
</html>
