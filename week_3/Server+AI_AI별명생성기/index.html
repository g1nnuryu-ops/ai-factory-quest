<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 별명 생성기 ✨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Gowun Dodum"', '"Noto Sans KR"', 'system-ui', 'sans-serif'],
            display: ['"Jua"', '"Gowun Dodum"', 'sans-serif'],
          },
          keyframes: {
            popIn: {
              '0%': { opacity: '0', transform: 'translateY(12px) scale(.96)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
            },
            floatUp: {
              '0%': { opacity: '0', transform: 'translateY(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-468px 0' },
              '100%': { backgroundPosition: '468px 0' },
            },
            spinSlow: { '100%': { transform: 'rotate(360deg)' } },
            blob: {
              '0%,100%': { transform: 'translate(0,0) scale(1)' },
              '33%': { transform: 'translate(20px,-30px) scale(1.08)' },
              '66%': { transform: 'translate(-15px,15px) scale(.94)' },
            },
          },
          animation: {
            popIn: 'popIn .42s cubic-bezier(.2,.8,.25,1) both',
            floatUp: 'floatUp .35s ease both',
            spinSlow: 'spinSlow 1.1s linear infinite',
            blobA: 'blob 14s ease-in-out infinite',
            blobB: 'blob 18s ease-in-out infinite',
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { height: 100%; }
    body { -webkit-font-smoothing: antialiased; }
    /* skeleton shimmer */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,.35) 0px, rgba(255,255,255,.7) 40px, rgba(255,255,255,.35) 80px);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    /* slim scrollbar */
    *::-webkit-scrollbar { width: 9px; height: 9px; }
    *::-webkit-scrollbar-thumb { background: rgba(124,58,237,.28); border-radius: 9px; }
    *::-webkit-scrollbar-thumb:hover { background: rgba(124,58,237,.45); }
    .card-tilt { transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
    .card-tilt:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="font-sans text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    // Same-origin Express server serves this file at "/" and exposes the API here.
    const API_BASE_URL = '/api';

    // ========================================
    // Constants
    // ========================================
    const STYLE_OPTIONS = [
      { value: '유쾌한', emoji: '😄' },
      { value: '귀여운', emoji: '🐣' },
      { value: '웃긴', emoji: '🤣' },
      { value: '멋진', emoji: '😎' },
      { value: '감성적인', emoji: '🌙' },
      { value: '힙한', emoji: '🔥' },
    ];

    const LOADING_LINES = [
      'AI가 당신의 매력 포인트를 분석하는 중...',
      '단어들을 요리조리 섞어보는 중...',
      '센스 있는 별명을 골라내는 중...',
      '작명소 도장 꾹 찍는 중...',
      '마지막으로 어감을 다듬는 중...',
    ];

    let idSeq = 0;
    const newId = () => `n${++idSeq}`;

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ variant = 'primary', size = 'md', className = '', children, ...props }) {
      const base =
        'inline-flex items-center justify-center gap-2 font-semibold rounded-2xl transition ' +
        'focus:outline-none focus-visible:ring-4 focus-visible:ring-violet-300/60 ' +
        'disabled:opacity-50 disabled:cursor-not-allowed select-none';
      const sizes = {
        sm: 'text-sm px-3 py-1.5',
        md: 'text-sm px-4 py-2.5',
        lg: 'text-base px-6 py-3.5',
      };
      const variants = {
        primary:
          'text-white bg-gradient-to-r from-violet-600 via-fuchsia-500 to-pink-500 ' +
          'shadow-lg shadow-fuchsia-500/30 hover:brightness-110 active:scale-[.98]',
        secondary:
          'text-violet-700 bg-white border border-violet-200 hover:bg-violet-50 active:scale-[.98]',
        ghost: 'text-slate-600 hover:bg-slate-100 active:scale-[.98]',
        soft:
          'text-fuchsia-700 bg-fuchsia-100/70 hover:bg-fuchsia-200/70 active:scale-[.98]',
      };
      return (
        <button className={`${base} ${sizes[size]} ${variants[variant]} ${className}`} {...props}>
          {children}
        </button>
      );
    }

    function Field({ id, label, hint, required, error, children }) {
      return (
        <div>
          <label htmlFor={id} className="block text-sm font-semibold text-slate-700 mb-1.5">
            {label}
            {required && <span className="text-fuchsia-500 ml-0.5" aria-hidden="true">*</span>}
            {hint && <span className="ml-2 text-xs font-normal text-slate-400">{hint}</span>}
          </label>
          {children}
          {error && <p className="mt-1 text-xs text-rose-500">{error}</p>}
        </div>
      );
    }

    function TextInput({ id, value, onChange, placeholder, ...props }) {
      return (
        <input
          id={id}
          type="text"
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          className="w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-3 text-[15px]
                     placeholder:text-slate-400 shadow-sm
                     focus:outline-none focus:border-violet-400 focus:ring-4 focus:ring-violet-200/60
                     transition"
          {...props}
        />
      );
    }

    // ========================================
    // 🧩 Sub-components
    // ========================================

    // Spinner icon (reused in button + loading panel)
    function Spinner({ className = 'w-5 h-5' }) {
      return (
        <svg className={`${className} animate-spinSlow`} viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke="currentColor" strokeOpacity="0.25" strokeWidth="3" />
          <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
        </svg>
      );
    }

    function StyleChips({ value, onChange }) {
      return (
        <div className="flex flex-wrap gap-2" role="radiogroup" aria-label="별명 분위기 선택">
          {STYLE_OPTIONS.map((opt) => {
            const active = value === opt.value;
            return (
              <button
                key={opt.value}
                type="button"
                role="radio"
                aria-checked={active}
                onClick={() => onChange(opt.value)}
                className={
                  'px-3.5 py-2 rounded-full text-sm font-semibold border transition active:scale-95 ' +
                  (active
                    ? 'bg-gradient-to-r from-violet-600 to-fuchsia-500 text-white border-transparent shadow-md shadow-fuchsia-500/30'
                    : 'bg-white/80 text-slate-600 border-slate-200 hover:border-violet-300 hover:text-violet-600')
                }
              >
                <span aria-hidden="true" className="mr-1">{opt.emoji}</span>
                {opt.value}
              </button>
            );
          })}
        </div>
      );
    }

    // Loading panel: cycling copy + skeleton card grid
    function LoadingState({ count }) {
      const [idx, setIdx] = useState(0);
      useEffect(() => {
        const t = setInterval(() => setIdx((i) => (i + 1) % LOADING_LINES.length), 1900);
        return () => clearInterval(t);
      }, []);
      const skeletons = Array.from({ length: count });
      return (
        <div>
          <div className="flex flex-col items-center text-center gap-3 mb-6" aria-live="polite">
            <div className="relative">
              <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-violet-500 to-fuchsia-500
                              grid place-items-center text-white shadow-lg shadow-fuchsia-500/30">
                <Spinner className="w-7 h-7" />
              </div>
            </div>
            <p key={idx} className="text-violet-700 font-semibold animate-floatUp">
              {LOADING_LINES[idx]}
            </p>
            <p className="text-xs text-slate-400">AI가 별명을 짓는 중이에요. 잠시만 기다려 주세요 ✨</p>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {skeletons.map((_, i) => (
              <div key={i} className="rounded-3xl border border-violet-100 bg-white/70 p-5 overflow-hidden">
                <div className="skeleton h-6 w-2/3 rounded-lg mb-3" />
                <div className="skeleton h-3.5 w-full rounded-md mb-2" />
                <div className="skeleton h-3.5 w-4/5 rounded-md" />
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ErrorState({ message, onRetry }) {
      return (
        <div className="rounded-3xl border border-rose-200 bg-rose-50/80 p-6 text-center animate-popIn" role="alert">
          <div className="mx-auto w-12 h-12 rounded-full bg-rose-100 grid place-items-center mb-3 text-2xl">😢</div>
          <h3 className="font-bold text-rose-700 mb-1">앗, 별명을 짓지 못했어요</h3>
          <p className="text-sm text-rose-600/90 mb-4 break-keep">{message}</p>
          {onRetry && (
            <Button variant="secondary" onClick={onRetry}>
              <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 4v5h5M20 20v-5h-5M5 14a7 7 0 0 0 12.9 2M19 10A7 7 0 0 0 6.1 8"
                      stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
              다시 시도하기
            </Button>
          )}
        </div>
      );
    }

    function EmptyState() {
      return (
        <div className="rounded-3xl border-2 border-dashed border-violet-200 bg-white/50 p-10 text-center animate-floatUp">
          <div className="text-5xl mb-3 animate-bounce" style={{ animationDuration: '2.2s' }}>🏷️</div>
          <h3 className="font-display text-xl text-violet-700 mb-1">나만의 별명을 만들어 볼까요?</h3>
          <p className="text-sm text-slate-500 break-keep max-w-sm mx-auto">
            왼쪽에 이름과 성격, 취미를 입력하고 <b className="text-fuchsia-600">별명 생성하기</b> 버튼을 눌러보세요.
            AI가 센스 있는 한국어 별명을 여러 개 지어드려요!
          </p>
        </div>
      );
    }

    // A single nickname result card (selectable + copyable)
    function NicknameCard({ data, index, selected, onToggle, onCopy, copied }) {
      const handleKey = (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          onToggle();
        }
      };
      return (
        <div
          role="button"
          tabIndex={0}
          aria-pressed={selected}
          aria-label={`별명 ${data.nickname}${selected ? ', 선택됨' : ''}. 클릭하면 선택 토글`}
          onClick={onToggle}
          onKeyDown={handleKey}
          style={{ animationDelay: `${index * 60}ms` }}
          className={
            'card-tilt group relative cursor-pointer rounded-3xl p-5 animate-popIn outline-none ' +
            'focus-visible:ring-4 focus-visible:ring-violet-300/60 ' +
            (selected
              ? 'bg-gradient-to-br from-violet-50 to-fuchsia-50 border-2 border-fuchsia-400 shadow-xl shadow-fuchsia-500/20'
              : 'bg-white/85 border border-slate-200 shadow-md hover:border-violet-300')
          }
        >
          {/* selection check badge */}
          <div
            aria-hidden="true"
            className={
              'absolute top-3.5 right-3.5 w-7 h-7 rounded-full grid place-items-center transition ' +
              (selected
                ? 'bg-gradient-to-br from-violet-600 to-fuchsia-500 text-white scale-100 shadow'
                : 'bg-slate-100 text-slate-300 scale-90 group-hover:bg-violet-100 group-hover:text-violet-400')
            }
          >
            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none">
              <path d="M5 13l4 4L19 7" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </div>

          <div className="pr-8">
            <p className="font-display text-2xl sm:text-[26px] leading-snug text-slate-800 break-keep">
              {data.nickname}
            </p>
            {data.reason && (
              <p className="mt-2 text-sm text-slate-500 leading-relaxed break-keep">{data.reason}</p>
            )}
          </div>

          <div className="mt-4 flex items-center justify-between">
            <span className={'text-xs font-medium ' + (selected ? 'text-fuchsia-600' : 'text-slate-300')}>
              {selected ? '♥ 마음에 듦' : '클릭해서 선택'}
            </span>
            <Button
              size="sm"
              variant={copied ? 'primary' : 'soft'}
              onClick={(e) => { e.stopPropagation(); onCopy(); }}
              aria-label={`${data.nickname} 복사`}
            >
              {copied ? (
                <>
                  <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M5 13l4 4L19 7" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                  복사됨!
                </>
              ) : (
                <>
                  <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect x="9" y="9" width="11" height="11" rx="2.5" stroke="currentColor" strokeWidth="2" />
                    <path d="M5 15V5.5A1.5 1.5 0 0 1 6.5 4H15" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
                  </svg>
                  복사
                </>
              )}
            </Button>
          </div>
        </div>
      );
    }

    // Lightweight toast
    function Toast({ toast }) {
      if (!toast) return null;
      return (
        <div
          className="fixed left-1/2 -translate-x-1/2 bottom-6 z-50 animate-floatUp"
          role="status"
          aria-live="polite"
        >
          <div className="px-5 py-3 rounded-2xl bg-slate-900/90 text-white text-sm font-semibold shadow-xl backdrop-blur flex items-center gap-2">
            <span aria-hidden="true">✅</span>
            {toast}
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Main App
    // ========================================
    function App() {
      // form state
      const [name, setName] = useState('');
      const [personality, setPersonality] = useState('');
      const [hobbies, setHobbies] = useState('');
      const [keywords, setKeywords] = useState('');
      const [style, setStyle] = useState('유쾌한');
      const [count, setCount] = useState(6);

      // request/result state
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [results, setResults] = useState(null);          // null = initial empty
      const [selected, setSelected] = useState(() => new Set());
      const [copiedKey, setCopiedKey] = useState(null);      // which card flashes "복사됨!"
      const [toast, setToast] = useState('');

      const abortRef = useRef(null);
      const lastPayloadRef = useRef(null);                   // for "다시 생성"
      const copyTimerRef = useRef(null);
      const toastTimerRef = useRef(null);
      const resultsTopRef = useRef(null);

      const trimmedName = name.trim();
      const canSubmit = trimmedName.length > 0 && !loading;

      // cleanup timers / inflight request on unmount
      useEffect(() => () => {
        if (abortRef.current) abortRef.current.abort();
        clearTimeout(copyTimerRef.current);
        clearTimeout(toastTimerRef.current);
      }, []);

      const showToast = useCallback((msg) => {
        setToast(msg);
        clearTimeout(toastTimerRef.current);
        toastTimerRef.current = setTimeout(() => setToast(''), 1800);
      }, []);

      // Clipboard with non-secure-context fallback
      const copyText = useCallback(async (text) => {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            return true;
          }
          throw new Error('insecure');
        } catch (_) {
          try {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.setAttribute('readonly', '');
            ta.style.position = 'fixed';
            ta.style.top = '-1000px';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            return ok;
          } catch (e2) {
            return false;
          }
        }
      }, []);

      const buildPayload = useCallback(() => ({
        name: trimmedName,
        personality: personality.trim(),
        hobbies: hobbies.trim(),
        keywords: keywords.trim(),
        style,
        count: Number(count),
      }), [trimmedName, personality, hobbies, keywords, style, count]);

      const requestNicknames = useCallback(async (payload) => {
        if (abortRef.current) abortRef.current.abort();
        const controller = new AbortController();
        abortRef.current = controller;
        lastPayloadRef.current = payload;

        setLoading(true);
        setError('');

        try {
          const res = await fetch(`${API_BASE_URL}/nickname`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            signal: controller.signal,
          });

          const data = await res.json().catch(() => null);

          if (!res.ok || !data || data.success !== true) {
            const msg =
              (data && data.message) ||
              (res.status >= 500
                ? '서버에 문제가 생겼어요. 잠시 후 다시 시도해 주세요.'
                : '별명을 생성하지 못했어요. 잠시 후 다시 시도해 주세요.');
            setError(msg);
            setResults(null);
            return;
          }

          const list = Array.isArray(data.nicknames) ? data.nicknames : [];
          if (list.length === 0) {
            setError('AI가 별명을 떠올리지 못했어요. 입력을 조금 바꿔서 다시 시도해 보세요.');
            setResults(null);
            return;
          }

          // attach stable keys for selection/copy tracking
          const withKeys = list.map((item) => ({
            key: newId(),
            nickname: String(item.nickname ?? '').trim() || '이름 없는 별명',
            reason: item.reason ? String(item.reason) : '',
          }));
          setResults(withKeys);
          setSelected(new Set());
        } catch (err) {
          if (err && err.name === 'AbortError') return; // superseded/unmounted
          const networkDown = err instanceof TypeError;
          setError(
            networkDown
              ? '서버에 연결할 수 없어요. 서버(node server.js)가 실행 중인지 확인해 주세요.'
              : '요청 중 문제가 발생했어요. 잠시 후 다시 시도해 주세요.'
          );
          setResults(null);
        } finally {
          if (abortRef.current === controller) {
            setLoading(false);
            abortRef.current = null;
          }
        }
      }, []);

      const handleSubmit = useCallback((e) => {
        if (e) e.preventDefault();
        if (!canSubmit) return;
        requestNicknames(buildPayload());
      }, [canSubmit, buildPayload, requestNicknames]);

      const handleRegenerate = useCallback(() => {
        const payload = lastPayloadRef.current || buildPayload();
        requestNicknames(payload);
      }, [buildPayload, requestNicknames]);

      // scroll results into view when they arrive (mobile: form is above results)
      useEffect(() => {
        if (results && resultsTopRef.current && window.innerWidth < 1024) {
          resultsTopRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, [results]);

      const toggleSelect = useCallback((key) => {
        setSelected((prev) => {
          const next = new Set(prev);
          if (next.has(key)) next.delete(key);
          else next.add(key);
          return next;
        });
      }, []);

      const handleCopyOne = useCallback(async (card) => {
        const ok = await copyText(card.nickname);
        if (ok) {
          setCopiedKey(card.key);
          clearTimeout(copyTimerRef.current);
          copyTimerRef.current = setTimeout(() => setCopiedKey(null), 1400);
          showToast(`"${card.nickname}" 복사 완료!`);
        } else {
          showToast('복사에 실패했어요. 직접 선택해 복사해 주세요.');
        }
      }, [copyText, showToast]);

      const selectedCards = useMemo(
        () => (results || []).filter((c) => selected.has(c.key)),
        [results, selected]
      );

      const handleCopySelected = useCallback(async () => {
        if (selectedCards.length === 0) return;
        const text = selectedCards.map((c) => c.nickname).join('\n');
        const ok = await copyText(text);
        showToast(ok ? `선택한 별명 ${selectedCards.length}개 복사 완료!` : '복사에 실패했어요.');
      }, [selectedCards, copyText, showToast]);

      // ---- render ----
      return (
        <div className="relative min-h-full overflow-hidden bg-gradient-to-br from-violet-50 via-fuchsia-50 to-rose-50">
          {/* decorative blobs */}
          <div aria-hidden="true" className="pointer-events-none absolute inset-0 overflow-hidden">
            <div className="absolute -top-24 -left-20 w-80 h-80 rounded-full bg-violet-300/30 blur-3xl animate-blobA" />
            <div className="absolute top-1/3 -right-24 w-96 h-96 rounded-full bg-fuchsia-300/30 blur-3xl animate-blobB" />
            <div className="absolute -bottom-32 left-1/4 w-96 h-96 rounded-full bg-rose-300/25 blur-3xl animate-blobA" />
          </div>

          <div className="relative max-w-6xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
            {/* Header */}
            <header className="text-center mb-8 sm:mb-10 animate-floatUp">
              <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/70 border border-white shadow-sm text-sm font-semibold text-violet-600 mb-4 backdrop-blur">
                <span aria-hidden="true">✨</span> AI 작명소
              </div>
              <h1 className="font-display text-4xl sm:text-5xl text-transparent bg-clip-text bg-gradient-to-r from-violet-600 via-fuchsia-500 to-pink-500 leading-tight">
                AI 별명 생성기
              </h1>
              <p className="mt-3 text-slate-500 break-keep max-w-md mx-auto">
                나의 이름과 성격, 취미를 알려주면 AI가 찰떡같은 별명을 지어드려요 🪄
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-[minmax(0,420px)_1fr] gap-6 lg:gap-8 items-start">
              {/* ===== Form panel ===== */}
              <form
                onSubmit={handleSubmit}
                className="rounded-3xl bg-white/70 backdrop-blur-xl border border-white shadow-xl shadow-violet-500/10 p-6 sm:p-7 lg:sticky lg:top-6 space-y-5"
              >
                <Field id="f-name" label="이름" required hint="별명의 주인공">
                  <TextInput
                    id="f-name"
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                    placeholder="예: 김철수, 또는 부르는 이름"
                    maxLength={40}
                    required
                    aria-required="true"
                  />
                </Field>

                <Field id="f-personality" label="성격" hint="선택">
                  <TextInput
                    id="f-personality"
                    value={personality}
                    onChange={(e) => setPersonality(e.target.value)}
                    placeholder="활발하고 장난기 많음"
                    maxLength={80}
                  />
                </Field>

                <Field id="f-hobbies" label="취미" hint="선택">
                  <TextInput
                    id="f-hobbies"
                    value={hobbies}
                    onChange={(e) => setHobbies(e.target.value)}
                    placeholder="게임, 농구, 그림"
                    maxLength={80}
                  />
                </Field>

                <Field id="f-keywords" label="추가 키워드 / 특징" hint="선택">
                  <TextInput
                    id="f-keywords"
                    value={keywords}
                    onChange={(e) => setKeywords(e.target.value)}
                    placeholder="안경, 커피 중독"
                    maxLength={80}
                  />
                </Field>

                <Field id="f-style" label="별명 분위기">
                  <StyleChips value={style} onChange={setStyle} />
                </Field>

                <Field id="f-count" label="별명 개수" hint={`${count}개`}>
                  <div className="flex items-center gap-3">
                    <input
                      id="f-count"
                      type="range"
                      min="3"
                      max="8"
                      step="1"
                      value={count}
                      onChange={(e) => setCount(Number(e.target.value))}
                      aria-valuetext={`${count}개`}
                      className="w-full accent-fuchsia-500 cursor-pointer"
                    />
                    <span className="shrink-0 w-12 text-center text-sm font-bold text-fuchsia-600 bg-fuchsia-100/70 rounded-lg py-1">
                      {count}개
                    </span>
                  </div>
                </Field>

                <Button type="submit" size="lg" disabled={!canSubmit} className="w-full">
                  {loading ? (
                    <>
                      <Spinner className="w-5 h-5" />
                      AI가 별명을 짓는 중...
                    </>
                  ) : (
                    <>
                      <span aria-hidden="true">🪄</span>
                      별명 생성하기
                    </>
                  )}
                </Button>

                {!trimmedName && (
                  <p className="text-center text-xs text-slate-400 -mt-1">
                    이름을 입력하면 버튼이 활성화돼요.
                  </p>
                )}
              </form>

              {/* ===== Results panel ===== */}
              <section ref={resultsTopRef} aria-live="polite" className="min-h-[300px]">
                {/* results toolbar (only when we have results & not loading/error) */}
                {results && !loading && !error && (
                  <div className="flex flex-wrap items-center justify-between gap-3 mb-4 animate-floatUp">
                    <div className="text-sm text-slate-500">
                      <b className="text-violet-700">{results.length}개</b>의 별명이 도착했어요
                      {selectedCards.length > 0 && (
                        <span className="ml-2 text-fuchsia-600 font-semibold">
                          · {selectedCards.length}개 선택됨
                        </span>
                      )}
                    </div>
                    <div className="flex items-center gap-2">
                      <Button
                        size="sm"
                        variant="secondary"
                        onClick={handleCopySelected}
                        disabled={selectedCards.length === 0}
                        aria-label="선택한 별명 모두 복사"
                      >
                        <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                          <rect x="9" y="9" width="11" height="11" rx="2.5" stroke="currentColor" strokeWidth="2" />
                          <path d="M5 15V5.5A1.5 1.5 0 0 1 6.5 4H15" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
                        </svg>
                        선택 모두 복사
                      </Button>
                      <Button size="sm" variant="soft" onClick={handleRegenerate} aria-label="같은 입력으로 다시 생성">
                        <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                          <path d="M4 4v5h5M20 20v-5h-5M5 14a7 7 0 0 0 12.9 2M19 10A7 7 0 0 0 6.1 8"
                                stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                        다시 생성
                      </Button>
                    </div>
                  </div>
                )}

                {/* main conditional: loading > error > results > empty */}
                {loading ? (
                  <LoadingState count={Number(count)} />
                ) : error ? (
                  <ErrorState message={error} onRetry={handleRegenerate} />
                ) : results ? (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {results.map((card, i) => (
                      <NicknameCard
                        key={card.key}
                        data={card}
                        index={i}
                        selected={selected.has(card.key)}
                        onToggle={() => toggleSelect(card.key)}
                        onCopy={() => handleCopyOne(card)}
                        copied={copiedKey === card.key}
                      />
                    ))}
                  </div>
                ) : (
                  <EmptyState />
                )}
              </section>
            </div>

            <footer className="text-center mt-12 text-xs text-slate-400">
              Made with React + Tailwind · 별명 생성은 <code className="px-1 rounded bg-white/60">POST /api/nickname</code> 서버가 필요해요
            </footer>
          </div>

          <Toast toast={toast} />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
