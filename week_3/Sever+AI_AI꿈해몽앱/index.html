<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>김부장 해몽소 🌙</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // 밤하늘/꿈/골드 컨셉 테마. 형제 프로젝트(별명 생성기)의 keyframes/animation 구조를 계승.
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Gowun Dodum"', '"Noto Sans KR"', 'system-ui', 'sans-serif'],
            display: ['"Jua"', '"Gowun Dodum"', 'sans-serif'],
          },
          colors: {
            night: {
              900: '#0b1026',
              800: '#141a3a',
              700: '#1d2550',
              600: '#283066',
            },
            gold: {
              300: '#ffe08a',
              400: '#ffd25a',
              500: '#f4b740',
            },
          },
          keyframes: {
            popIn: {
              '0%': { opacity: '0', transform: 'translateY(14px) scale(.96)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
            },
            floatUp: {
              '0%': { opacity: '0', transform: 'translateY(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-468px 0' },
              '100%': { backgroundPosition: '468px 0' },
            },
            spinSlow: { '100%': { transform: 'rotate(360deg)' } },
            twinkle: {
              '0%,100%': { opacity: '0.25', transform: 'scale(0.85)' },
              '50%': { opacity: '1', transform: 'scale(1.15)' },
            },
            floaty: {
              '0%,100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-7px)' },
            },
            blob: {
              '0%,100%': { transform: 'translate(0,0) scale(1)' },
              '33%': { transform: 'translate(24px,-26px) scale(1.08)' },
              '66%': { transform: 'translate(-16px,16px) scale(.94)' },
            },
            gaugeGrow: {
              '0%': { width: '0%' },
            },
            sheen: {
              '0%': { transform: 'translateX(-120%)' },
              '60%,100%': { transform: 'translateX(220%)' },
            },
          },
          animation: {
            popIn: 'popIn .5s cubic-bezier(.2,.8,.25,1) both',
            floatUp: 'floatUp .4s ease both',
            spinSlow: 'spinSlow 1.1s linear infinite',
            twinkle: 'twinkle 3s ease-in-out infinite',
            floaty: 'floaty 4s ease-in-out infinite',
            blobA: 'blob 16s ease-in-out infinite',
            blobB: 'blob 20s ease-in-out infinite',
            gauge: 'gaugeGrow 1.1s cubic-bezier(.2,.8,.25,1) both',
            sheen: 'sheen 2.6s ease-in-out infinite',
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { height: 100%; }
    body { -webkit-font-smoothing: antialiased; }
    /* 스켈레톤 shimmer (밤하늘 톤의 어두운 버전) */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,.06) 0px, rgba(255,255,255,.16) 40px, rgba(255,255,255,.06) 80px);
      background-size: 600px 100%;
      animation: shimmer 1.5s infinite linear;
    }
    /* 슬림 스크롤바 (골드 톤) */
    *::-webkit-scrollbar { width: 9px; height: 9px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: rgba(244,183,64,.30); border-radius: 9px; }
    *::-webkit-scrollbar-thumb:hover { background: rgba(244,183,64,.5); }
    .card-tilt { transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; }
    .card-tilt:hover { transform: translateY(-3px); }
    /* 말풍선 꼬리 */
    .speech::before {
      content: '';
      position: absolute;
      left: 30px;
      top: -10px;
      border-width: 0 10px 11px 10px;
      border-style: solid;
      border-color: transparent transparent rgba(255,255,255,0.10) transparent;
    }
  </style>
</head>
<body class="font-sans text-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    // 같은 출처(same-origin) Express 서버가 이 파일을 "/"로 서빙하고 아래 API를 노출한다.
    const API_BASE_URL = '/api';

    // ========================================
    // Constants — 캐릭터(김부장) 카피 / verdict 테마
    // ========================================

    // textarea placeholder: 김부장 말투
    const DREAM_PLACEHOLDER =
      "어이 김대리~ 어젯밤 무슨 꿈 꿨는지 여기다 주절주절 적어봐.\n" +
      "예) 돼지가 우리 집 거실로 들어와서 나한테 절을 하더라고. 근데 갑자기 똥을 싸는 거야...\n\n" +
      "(자세히 적을수록 내가 왕년의 짬밥으로 제대로 풀어주지)";

    // 로딩 문구 로테이션 (꼰대 톤)
    const LOADING_LINES = [
      "어이, 좀 기다려봐. 내가 왕년에 해몽으로 부장까지 단 사람이야...",
      "음... 이건 말이야, 나 때는 이런 꿈을 '대박 꿈'이라 그랬지.",
      "주식 창 잠깐 닫고 자네 꿈에 집중하는 중이니까 조용히 해봐.",
      "제네시스 시동 끄고 진지하게 풀어보는 중이다, 잠깐만.",
      "요즘 젊은 것들은 성격이 급해. 해몽도 뜸을 들여야 맛이야.",
      "서울에 자가 있는 사람의 해몽은 좀 다르거든. 기다려봐.",
    ];

    // 빈 입력/짧은 입력 시 김부장 잔소리 로테이션
    const NAG_TOO_SHORT = [
      "어허, 그렇게 대충 적으면 내가 뭘 풀어줘? 꿈 내용을 좀 더 적어봐.",
      "자네, 이게 꿈이야 단어야? 최소한 한 문장은 적어야 할 거 아닌가.",
      "나 때는 꿈도 정성껏 적었어. 좀 더 자세히 써보게.",
    ];
    const NAG_EMPTY =
      "어이~ 빈칸 내고 해몽 받겠다는 건 무슨 심보야? 어젯밤 꿈부터 적어와.";

    // verdict별 테마(색/이모지/라벨/게이지 그라데이션)
    const VERDICT_THEME = {
      "길몽": {
        emoji: "🍀",
        label: "길몽",
        ring: "ring-emerald-400/50",
        badgeBg: "bg-gradient-to-r from-emerald-400 to-gold-400",
        badgeText: "text-emerald-950",
        glow: "shadow-emerald-400/30",
        gaugeFrom: "from-emerald-400",
        gaugeTo: "to-gold-400",
        scoreText: "text-emerald-300",
        tagline: "오, 이건 아주 좋은 꿈이구만!",
      },
      "흉몽": {
        emoji: "⚠️",
        label: "흉몽",
        ring: "ring-rose-500/50",
        badgeBg: "bg-gradient-to-r from-rose-600 to-rose-400",
        badgeText: "text-white",
        glow: "shadow-rose-500/30",
        gaugeFrom: "from-rose-600",
        gaugeTo: "to-rose-400",
        scoreText: "text-rose-300",
        tagline: "어허... 이건 좀 조심해야 쓰겠어.",
      },
      "반길몽반흉몽": {
        emoji: "☯️",
        label: "반길몽반흉몽",
        ring: "ring-amber-400/50",
        badgeBg: "bg-gradient-to-r from-amber-500 to-gold-300",
        badgeText: "text-amber-950",
        glow: "shadow-amber-400/30",
        gaugeFrom: "from-rose-500 via-amber-400",
        gaugeTo: "to-emerald-400",
        scoreText: "text-amber-300",
        tagline: "이게 반은 좋고 반은 영 그래. 잘 들어봐.",
      },
    };
    // 서버가 예상 밖 verdict 문자열을 줄 때 안전한 기본값
    const FALLBACK_THEME = VERDICT_THEME["반길몽반흉몽"];
    const themeFor = (v) => VERDICT_THEME[v] || FALLBACK_THEME;

    const clampScore = (n) => {
      const x = Math.round(Number(n));
      if (!Number.isFinite(x)) return 50;
      return Math.max(0, Math.min(100, x));
    };

    // ========================================
    // 🎨 Design System Components (순수 표현용, 비즈니스 로직 없음)
    // ========================================
    function Button({ variant = 'primary', size = 'md', className = '', children, ...props }) {
      const base =
        'inline-flex items-center justify-center gap-2 font-semibold rounded-2xl transition ' +
        'focus:outline-none focus-visible:ring-4 focus-visible:ring-gold-400/50 ' +
        'disabled:opacity-50 disabled:cursor-not-allowed select-none';
      const sizes = {
        sm: 'text-sm px-3 py-1.5',
        md: 'text-sm px-4 py-2.5',
        lg: 'text-base px-6 py-3.5',
      };
      const variants = {
        // 골드 그라데이션 = 김부장의 거들먹거리는 부의 상징
        primary:
          'text-night-900 bg-gradient-to-r from-gold-300 via-gold-400 to-gold-500 ' +
          'shadow-lg shadow-gold-500/30 hover:brightness-110 active:scale-[.98]',
        secondary:
          'text-gold-200 bg-white/5 border border-gold-400/40 hover:bg-white/10 active:scale-[.98]',
        ghost: 'text-slate-300 hover:bg-white/10 active:scale-[.98]',
      };
      return (
        <button className={`${base} ${sizes[size]} ${variants[variant]} ${className}`} {...props}>
          {children}
        </button>
      );
    }

    // 김부장 아바타 (넥타이 맨 아저씨 이모지 + 골드 링)
    function BujangAvatar({ size = 'md', className = '' }) {
      const dim = { sm: 'w-10 h-10 text-xl', md: 'w-14 h-14 text-3xl', lg: 'w-16 h-16 text-4xl' }[size];
      return (
        <div
          className={
            `${dim} ${className} shrink-0 grid place-items-center rounded-2xl ` +
            'bg-gradient-to-br from-night-600 to-night-800 ' +
            'ring-2 ring-gold-400/60 shadow-lg shadow-gold-500/20'
          }
          aria-hidden="true"
        >
          <span>🧑‍💼</span>
        </div>
      );
    }

    // 스피너 (버튼 + 로딩 패널 공용)
    function Spinner({ className = 'w-5 h-5' }) {
      return (
        <svg className={`${className} animate-spinSlow`} viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="9" stroke="currentColor" strokeOpacity="0.25" strokeWidth="3" />
          <path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
        </svg>
      );
    }

    // ========================================
    // 🧩 Sub-components
    // ========================================

    // verdict 배지 (길몽=골드/그린, 흉몽=레드, 반길=앰버)
    function VerdictBadge({ verdict }) {
      const t = themeFor(verdict);
      return (
        <span
          className={
            `inline-flex items-center gap-2 px-4 py-2 rounded-full font-display text-lg ` +
            `${t.badgeBg} ${t.badgeText} shadow-lg ${t.glow}`
          }
        >
          <span aria-hidden="true" className="text-xl">{t.emoji}</span>
          {t.label}
        </span>
      );
    }

    // score 게이지 (0~100 가로 막대 + 애니메이션 fill)
    function ScoreGauge({ score, verdict }) {
      const t = themeFor(verdict);
      const pct = clampScore(score);
      return (
        <div className="w-full">
          <div className="flex items-end justify-between mb-1.5">
            <span className="text-xs font-semibold text-slate-400">흉몽 지수 ◀ 길몽 지수</span>
            <span className={`font-display text-2xl ${t.scoreText}`}>
              {pct}
              <span className="text-sm text-slate-500 ml-0.5">점</span>
            </span>
          </div>
          <div
            className="relative h-4 w-full rounded-full bg-white/10 overflow-hidden ring-1 ring-white/10"
            role="meter"
            aria-valuenow={pct}
            aria-valuemin={0}
            aria-valuemax={100}
            aria-label={`길몽 지수 ${pct}점 (100점에 가까울수록 길몽)`}
          >
            {/* fill: width를 인라인 스타일로, 진입 시 0%→pct% 애니메이션 */}
            <div
              className={`h-full rounded-full bg-gradient-to-r ${t.gaugeFrom} ${t.gaugeTo} animate-gauge relative overflow-hidden`}
              style={{ width: `${pct}%` }}
            >
              {/* sheen 반짝임 */}
              <div className="absolute inset-y-0 left-0 w-1/3 bg-white/30 blur-md animate-sheen" aria-hidden="true" />
            </div>
          </div>
          {/* 눈금 라벨 */}
          <div className="flex justify-between mt-1 text-[10px] text-slate-500">
            <span>0</span><span>50</span><span>100</span>
          </div>
        </div>
      );
    }

    // 로딩 패널: 김부장 아바타 + 회전 카피 + 스켈레톤
    function LoadingState() {
      const [idx, setIdx] = useState(0);
      useEffect(() => {
        const t = setInterval(() => setIdx((i) => (i + 1) % LOADING_LINES.length), 2100);
        return () => clearInterval(t);
      }, []);
      return (
        <div className="rounded-3xl border border-white/10 bg-white/5 backdrop-blur-xl p-6 sm:p-8 animate-popIn">
          <div className="flex flex-col items-center text-center gap-4" aria-live="polite">
            <div className="relative animate-floaty">
              <BujangAvatar size="lg" />
              <span className="absolute -bottom-1 -right-1 w-6 h-6 rounded-full bg-night-800 ring-2 ring-gold-400/60 grid place-items-center">
                <Spinner className="w-4 h-4 text-gold-300" />
              </span>
            </div>
            <p key={idx} className="text-gold-200 font-semibold animate-floatUp max-w-sm break-keep">
              {LOADING_LINES[idx]}
            </p>
            <p className="text-xs text-slate-400">김부장이 자네 꿈을 풀이하는 중이야. 잠깐만 기다리게 ☕</p>
          </div>

          {/* 결과 카드 레이아웃을 흉내낸 스켈레톤 (레이아웃 점프 방지) */}
          <div className="mt-7 space-y-4">
            <div className="flex items-center justify-between">
              <div className="skeleton h-9 w-28 rounded-full" />
              <div className="skeleton h-7 w-16 rounded-lg" />
            </div>
            <div className="skeleton h-4 w-full rounded-full" />
            <div className="skeleton h-7 w-3/4 rounded-lg" />
            <div className="skeleton h-20 w-full rounded-2xl" />
            <div className="skeleton h-14 w-full rounded-2xl" />
          </div>
        </div>
      );
    }

    // 에러 패널 (서버 message 또는 네트워크 안내를 김부장 톤 래퍼로)
    function ErrorState({ message, onRetry }) {
      return (
        <div className="rounded-3xl border border-rose-400/30 bg-rose-500/10 backdrop-blur-xl p-6 sm:p-8 text-center animate-popIn" role="alert">
          <div className="mx-auto mb-3 flex items-center justify-center gap-2">
            <BujangAvatar size="sm" />
            <span className="text-3xl" aria-hidden="true">😤</span>
          </div>
          <h3 className="font-display text-xl text-rose-200 mb-1">어허, 해몽이 잠깐 막혔구만</h3>
          <p className="text-sm text-rose-100/90 mb-5 break-keep max-w-md mx-auto">{message}</p>
          {onRetry && (
            <Button variant="secondary" onClick={onRetry}>
              <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 4v5h5M20 20v-5h-5M5 14a7 7 0 0 0 12.9 2M19 10A7 7 0 0 0 6.1 8"
                      stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
              다시 해몽 받기
            </Button>
          )}
        </div>
      );
    }

    // 초기 빈 상태 (입력 유도)
    function EmptyState() {
      return (
        <div className="rounded-3xl border-2 border-dashed border-white/15 bg-white/5 p-8 sm:p-10 text-center animate-floatUp">
          <div className="text-5xl mb-4 animate-floaty">🌙💤</div>
          <h3 className="font-display text-xl text-gold-200 mb-2">자네 꿈, 이 김부장이 풀어주지</h3>
          <p className="text-sm text-slate-300 break-keep max-w-sm mx-auto leading-relaxed">
            왼쪽에 어젯밤 꾼 꿈을 적고 <b className="text-gold-300">해몽 받기</b> 버튼을 누르게.
            길몽인지 흉몽인지, 행운의 아이템까지 13년차 부장의 짬으로 알려줌세.
          </p>
        </div>
      );
    }

    // 결과 카드 (verdict 배지 + score 게이지 + 제목/해몽/조언/행운아이템)
    function ResultView({ result, onReset }) {
      const t = themeFor(result.verdict);
      return (
        <div
          className={
            `relative rounded-3xl border border-white/10 bg-gradient-to-b from-white/[0.08] to-white/[0.03] ` +
            `backdrop-blur-xl p-6 sm:p-8 shadow-2xl ${t.glow} ring-1 ${t.ring} animate-popIn`
          }
        >
          {/* 상단: 배지 + 다시하기 */}
          <div className="flex items-center justify-between gap-3 mb-5">
            <VerdictBadge verdict={result.verdict} />
            <Button size="sm" variant="ghost" onClick={onReset} aria-label="처음으로 돌아가 다시 해몽하기">
              <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 4v5h5M20 20v-5h-5M5 14a7 7 0 0 0 12.9 2M19 10A7 7 0 0 0 6.1 8"
                      stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
              다시 해몽하기
            </Button>
          </div>

          {/* score 게이지 */}
          <div className="mb-6">
            <ScoreGauge score={result.score} verdict={result.verdict} />
          </div>

          {/* 제목 (크게) */}
          <h2 className="font-display text-2xl sm:text-3xl leading-snug text-white break-keep mb-5">
            “{result.title}”
          </h2>

          {/* 해몽 본문 = 김부장 말풍선 */}
          <div className="flex gap-3 mb-5">
            <BujangAvatar size="sm" className="mt-1" />
            <div className="speech relative flex-1 rounded-2xl rounded-tl-sm bg-white/10 border border-white/10 p-4">
              <p className="text-[11px] font-semibold text-gold-300/80 mb-1">김부장의 해몽</p>
              <p className="text-[15px] leading-relaxed text-slate-100 break-keep whitespace-pre-line">
                {result.interpretation}
              </p>
            </div>
          </div>

          {/* 조언 = "김부장의 한 마디" */}
          <div className="rounded-2xl bg-gold-400/10 border border-gold-400/25 p-4 mb-5">
            <p className="flex items-center gap-1.5 text-xs font-bold text-gold-300 mb-1.5">
              <span aria-hidden="true">💬</span> 김부장의 한 마디
            </p>
            <p className="text-[15px] leading-relaxed text-gold-50 break-keep whitespace-pre-line">
              {result.advice}
            </p>
          </div>

          {/* 행운의 아이템 = 칩/뱃지 */}
          {result.luckyItem && (
            <div className="flex flex-wrap items-center gap-2">
              <span className="text-xs font-semibold text-slate-400">오늘의 행운 아이템</span>
              <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-gradient-to-r from-gold-300/20 to-gold-500/20 border border-gold-400/40 text-gold-200 text-sm font-bold">
                <span aria-hidden="true">🍀</span>
                {result.luckyItem}
              </span>
            </div>
          )}
        </div>
      );
    }

    // 별 배경 (장식)
    function Starfield() {
      const stars = useMemo(() => {
        const arr = [];
        for (let i = 0; i < 36; i++) {
          arr.push({
            top: Math.random() * 100,
            left: Math.random() * 100,
            size: Math.random() * 2 + 1,
            delay: (Math.random() * 3).toFixed(2),
            dur: (Math.random() * 2 + 2).toFixed(2),
          });
        }
        return arr;
      }, []);
      return (
        <div aria-hidden="true" className="pointer-events-none absolute inset-0 overflow-hidden">
          {/* 그라데이션 성운 blob */}
          <div className="absolute -top-28 -left-24 w-96 h-96 rounded-full bg-indigo-600/25 blur-3xl animate-blobA" />
          <div className="absolute top-1/4 -right-28 w-[28rem] h-[28rem] rounded-full bg-violet-600/20 blur-3xl animate-blobB" />
          <div className="absolute -bottom-32 left-1/4 w-[26rem] h-[26rem] rounded-full bg-blue-700/20 blur-3xl animate-blobA" />
          {/* 반짝이는 별 */}
          {stars.map((s, i) => (
            <span
              key={i}
              className="absolute rounded-full bg-white animate-twinkle"
              style={{
                top: `${s.top}%`,
                left: `${s.left}%`,
                width: `${s.size}px`,
                height: `${s.size}px`,
                animationDelay: `${s.delay}s`,
                animationDuration: `${s.dur}s`,
              }}
            />
          ))}
        </div>
      );
    }

    // 입력 화면 (textarea + 제출). 부모가 onSubmit / loading / 에러 메시지를 내려줌.
    function InputView({ dream, setDream, onSubmit, loading, localHint }) {
      const len = dream.trim().length;
      const canSubmit = len >= 5 && !loading;
      return (
        <form
          onSubmit={onSubmit}
          className="rounded-3xl bg-white/5 backdrop-blur-xl border border-white/10 shadow-xl shadow-black/20 p-6 sm:p-7 lg:sticky lg:top-6"
        >
          {/* 김부장 인사 */}
          <div className="flex items-center gap-3 mb-4">
            <BujangAvatar size="md" />
            <div>
              <p className="font-display text-lg text-gold-200 leading-tight">김부장이오</p>
              <p className="text-xs text-slate-400">자, 어젯밤 꿈 한번 들어봅시다</p>
            </div>
          </div>

          <label htmlFor="dream-input" className="block text-sm font-semibold text-slate-200 mb-2">
            어젯밤 꾼 꿈
            <span className="text-gold-400 ml-0.5" aria-hidden="true">*</span>
            <span className="ml-2 text-xs font-normal text-slate-400">자세할수록 해몽이 정확해져</span>
          </label>

          <textarea
            id="dream-input"
            value={dream}
            onChange={(e) => setDream(e.target.value)}
            placeholder={DREAM_PLACEHOLDER}
            rows={7}
            maxLength={1000}
            aria-required="true"
            className="w-full resize-y rounded-2xl border border-white/15 bg-night-900/50 px-4 py-3 text-[15px] leading-relaxed
                       text-slate-100 placeholder:text-slate-500
                       focus:outline-none focus:border-gold-400/70 focus:ring-4 focus:ring-gold-400/20 transition"
          />

          <div className="mt-1.5 flex items-center justify-between text-xs">
            <span className={localHint ? 'text-rose-300 font-semibold break-keep' : 'text-slate-500'}>
              {localHint || ' '}
            </span>
            <span className="text-slate-500 shrink-0 ml-2">{dream.length}/1000</span>
          </div>

          <Button type="submit" size="lg" disabled={!canSubmit} className="w-full mt-4">
            {loading ? (
              <>
                <Spinner className="w-5 h-5" />
                김부장이 해몽하는 중...
              </>
            ) : (
              <>
                <span aria-hidden="true">🔮</span>
                해몽 받기
              </>
            )}
          </Button>

          {len < 5 && !loading && (
            <p className="text-center text-xs text-slate-500 mt-2">
              꿈 내용을 다섯 글자 이상 적으면 버튼이 활성화되네.
            </p>
          )}
        </form>
      );
    }

    // ========================================
    // 📄 Main App
    // ========================================
    function App() {
      const [dream, setDream] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');        // '' = 에러 없음
      const [result, setResult] = useState(null);    // null = 아직 결과 없음
      const [localHint, setLocalHint] = useState(''); // 클라이언트측 입력 검증 잔소리

      const abortRef = useRef(null);
      const resultsTopRef = useRef(null);

      // 언마운트 시 진행 중 요청 취소
      useEffect(() => () => {
        if (abortRef.current) abortRef.current.abort();
      }, []);

      // 결과 도착 시 모바일에서 결과 영역으로 스크롤
      useEffect(() => {
        if (result && resultsTopRef.current && window.innerWidth < 1024) {
          resultsTopRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, [result]);

      const requestInterpret = useCallback(async (dreamText) => {
        if (abortRef.current) abortRef.current.abort();
        const controller = new AbortController();
        abortRef.current = controller;

        setLoading(true);
        setError('');
        setResult(null);

        try {
          // === 공유 API 계약: POST /api/interpret { dream } ===
          const res = await fetch(`${API_BASE_URL}/interpret`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dream: dreamText }),
            signal: controller.signal,
          });

          // HTTP 상태와 무관하게 JSON 파싱 (비-JSON 에러 바디로도 안 깨지게)
          const data = await res.json().catch(() => null);

          if (!data || data.success !== true || !data.result) {
            // 서버가 준 message를 그대로 보여주는 게 1순위
            const msg =
              (data && data.message) ||
              (res.status >= 500
                ? '김부장이 잠깐 자리를 비웠나 보네. 잠시 후 다시 시도하게.'
                : '해몽을 가져오지 못했어. 잠시 후 다시 시도해주게.');
            setError(msg);
            return;
          }

          // result 정규화 (필드 누락/타입 방어)
          const r = data.result;
          const normalized = {
            verdict: VERDICT_THEME[r.verdict] ? r.verdict : '반길몽반흉몽',
            score: clampScore(r.score),
            title: (r.title != null && String(r.title).trim()) || '오묘한 꿈이로구만',
            interpretation: (r.interpretation != null && String(r.interpretation).trim()) ||
              '음... 이건 김부장도 한참을 들여다봐야 할 꿈이야.',
            advice: (r.advice != null && String(r.advice).trim()) ||
              '오늘 하루 마음 단단히 먹고, 매사에 신중하게나.',
            luckyItem: r.luckyItem != null ? String(r.luckyItem).trim() : '',
          };
          setResult(normalized);
        } catch (err) {
          if (err && err.name === 'AbortError') return; // 교체/언마운트로 취소된 요청
          const networkDown = err instanceof TypeError;
          setError(
            networkDown
              ? '서버에 연결할 수가 없네. 서버(node server.js)가 켜져 있는지 확인하고 다시 오게.'
              : '해몽 도중 문제가 생겼어. 잠시 후 다시 시도해주게.'
          );
        } finally {
          if (abortRef.current === controller) {
            setLoading(false);
            abortRef.current = null;
          }
        }
      }, []);

      const handleSubmit = useCallback((e) => {
        if (e) e.preventDefault();
        const text = dream.trim();
        // 클라이언트측 1차 방어 + 김부장 잔소리
        if (text.length === 0) {
          setLocalHint(NAG_EMPTY);
          return;
        }
        if (text.length < 5) {
          const nag = NAG_TOO_SHORT[Math.floor(Math.random() * NAG_TOO_SHORT.length)];
          setLocalHint(nag);
          return;
        }
        setLocalHint('');
        requestInterpret(text);
      }, [dream, requestInterpret]);

      // 입력이 바뀌어 충분히 길어지면 잔소리 자동 제거
      useEffect(() => {
        if (localHint && dream.trim().length >= 5) setLocalHint('');
      }, [dream, localHint]);

      const handleReset = useCallback(() => {
        if (abortRef.current) abortRef.current.abort();
        setResult(null);
        setError('');
        setLocalHint('');
        // 입력 패널로 포커스 유도
        const el = document.getElementById('dream-input');
        if (el) el.focus();
      }, []);

      const handleRetry = useCallback(() => {
        const text = dream.trim();
        if (text.length >= 5) requestInterpret(text);
        else handleReset();
      }, [dream, requestInterpret, handleReset]);

      return (
        <div className="relative min-h-full overflow-hidden bg-gradient-to-b from-night-900 via-night-800 to-night-900">
          <Starfield />

          <div className="relative max-w-6xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
            {/* ===== Header / 브랜딩 ===== */}
            <header className="text-center mb-8 sm:mb-10 animate-floatUp">
              <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-gold-400/30 shadow-sm text-sm font-semibold text-gold-300 mb-4 backdrop-blur">
                <span aria-hidden="true">🌙</span> AI 꿈해몽
              </div>
              <h1 className="font-display text-4xl sm:text-5xl text-transparent bg-clip-text bg-gradient-to-r from-gold-300 via-gold-400 to-gold-500 leading-tight">
                김부장 해몽소
              </h1>
              <p className="mt-3 text-slate-400 break-keep max-w-md mx-auto">
                서울 자가 보유 · 부장 13년차 · 짬에서 나오는 바이브로 자네 꿈을 풀어주지 🔮
              </p>
            </header>

            {/* ===== 2열 레이아웃 (모바일 1열) ===== */}
            <div className="grid grid-cols-1 lg:grid-cols-[minmax(0,440px)_1fr] gap-6 lg:gap-8 items-start">
              {/* 입력 패널 */}
              <InputView
                dream={dream}
                setDream={setDream}
                onSubmit={handleSubmit}
                loading={loading}
                localHint={localHint}
              />

              {/* 결과 패널: 로딩 > 에러 > 결과 > 빈상태 */}
              <section ref={resultsTopRef} aria-live="polite" className="min-h-[320px]">
                {loading ? (
                  <LoadingState />
                ) : error ? (
                  <ErrorState message={error} onRetry={handleRetry} />
                ) : result ? (
                  <ResultView result={result} onReset={handleReset} />
                ) : (
                  <EmptyState />
                )}
              </section>
            </div>

            <footer className="text-center mt-12 text-xs text-slate-500">
              Made with React + Tailwind · 해몽은{' '}
              <code className="px-1 rounded bg-white/10 text-gold-300">POST /api/interpret</code>{' '}
              서버가 필요합니다 · 결과는 재미로 봐주세요 🙇
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
