<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>날씨 기반 옷차림 추천</title>
  <style>
    /* ---- 기본 리셋 & 테마 ---- */
    :root {
      --bg1: #4f6df5;
      --bg2: #7c4dff;
      --card: rgba(255, 255, 255, 0.96);
      --text: #1f2937;
      --muted: #6b7280;
      --chip: #eef2ff;
      --chip-text: #4338ca;
      --accent: #4f46e5;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }
    .wrap { width: 100%; max-width: 440px; }
    header { text-align: center; color: #fff; margin-bottom: 18px; }
    header h1 { font-size: 1.5rem; margin: 0 0 4px; }
    header p { margin: 0; opacity: 0.9; font-size: 0.9rem; }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
    }

    /* ---- 위치 줄 ---- */
    .loc-row {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }
    .loc-row .city { color: var(--text); font-weight: 600; }
    .source-tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--chip-text);
      margin-left: auto;
    }

    /* ---- 현재 날씨 ---- */
    .weather-main {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 4px;
    }
    .weather-main img { width: 72px; height: 72px; }
    .temp { font-size: 3rem; font-weight: 700; line-height: 1; }
    .desc { color: var(--muted); font-size: 1rem; }
    .feels { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }

    hr { border: none; border-top: 1px solid #eef0f4; margin: 18px 0; }

    /* ---- 추천 ---- */
    .reco-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 12px;
    }
    .reco-title h2 { font-size: 1.05rem; margin: 0; }
    .reco-title .range {
      font-size: 0.8rem;
      color: #fff;
      background: var(--accent);
      padding: 2px 10px;
      border-radius: 999px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: var(--chip);
      color: var(--chip-text);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .tip {
      margin-top: 14px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    /* ---- 상태(로딩/에러) ---- */
    .state {
      text-align: center;
      color: var(--muted);
      padding: 24px 8px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 4px solid #e5e7eb;
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { color: #b91c1c; }

    /* ---- 버튼 ---- */
    button.refresh {
      margin-top: 18px;
      width: 100%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.05s;
    }
    button.refresh:hover { opacity: 0.92; }
    button.refresh:active { transform: scale(0.99); }
    button.refresh:disabled { opacity: 0.55; cursor: default; }

    .updated { text-align: center; color: rgba(255,255,255,0.85); font-size: 0.75rem; margin-top: 12px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>👕 오늘의 옷차림 추천</h1>
      <p>현재 위치의 날씨에 맞는 옷차림을 알려드려요</p>
    </header>

    <div class="card">
      <!-- 로딩 상태 -->
      <div id="loading" class="state">
        <div class="spinner"></div>
        <div id="loading-text">위치와 날씨 정보를 불러오는 중...</div>
      </div>

      <!-- 에러 상태 -->
      <div id="error" class="state error-box hidden"></div>

      <!-- 결과 -->
      <div id="result" class="hidden">
        <div class="loc-row">
          <span>📍</span>
          <span class="city" id="city">—</span>
          <span class="source-tag" id="source-tag"></span>
        </div>

        <div class="weather-main">
          <img id="weather-icon" alt="날씨 아이콘" />
          <div>
            <div class="temp"><span id="temp">—</span>°</div>
          </div>
          <div style="margin-left:8px;">
            <div class="desc" id="desc">—</div>
            <div class="feels">체감 <span id="feels">—</span>°</div>
          </div>
        </div>

        <hr />

        <div class="reco-title">
          <h2>추천 옷차림</h2>
          <span class="range" id="range">—</span>
        </div>
        <div class="chips" id="chips"></div>
        <div class="tip hidden" id="tip"></div>
      </div>

      <button class="refresh" id="refresh-btn">🔄 다시 시도 / 새로고침</button>
    </div>

    <div class="updated hidden" id="updated"></div>
  </div>

  <script>
    // ========================================================
    // 프론트엔드 — 바닐라 JS (빌드 없음)
    // 1) 브라우저 geolocation으로 위치를 얻고 /recommend?lat=&lon= 호출
    // 2) 거부/실패 시 /recommend 호출 → 서버가 IP로 위치 추정(폴백)
    // ========================================================
    const $ = (id) => document.getElementById(id);

    const els = {
      loading: $('loading'),
      loadingText: $('loading-text'),
      error: $('error'),
      result: $('result'),
      city: $('city'),
      sourceTag: $('source-tag'),
      icon: $('weather-icon'),
      temp: $('temp'),
      desc: $('desc'),
      feels: $('feels'),
      range: $('range'),
      chips: $('chips'),
      tip: $('tip'),
      updated: $('updated'),
      btn: $('refresh-btn'),
    };

    // 위치 출처를 사람이 읽기 좋은 한국어 라벨로.
    const SOURCE_LABEL = {
      gps: 'GPS 기준',
      ip: 'IP 추정',
      default: '기본 위치(서울)',
    };

    function showLoading(text) {
      els.loadingText.textContent = text || '위치와 날씨 정보를 불러오는 중...';
      els.loading.classList.remove('hidden');
      els.error.classList.add('hidden');
      els.result.classList.add('hidden');
      els.updated.classList.add('hidden');
      els.btn.disabled = true;
    }

    function showError(message) {
      els.error.textContent = message;
      els.error.classList.remove('hidden');
      els.loading.classList.add('hidden');
      els.result.classList.add('hidden');
      els.updated.classList.add('hidden');
      els.btn.disabled = false;
    }

    function render(data) {
      // 위치
      els.city.textContent = data.location.city || '알 수 없는 지역';
      els.sourceTag.textContent = SOURCE_LABEL[data.location.source] || '';

      // 날씨
      els.temp.textContent = Math.round(data.weather.temp);
      els.feels.textContent = Math.round(data.weather.feelsLike);
      els.desc.textContent = data.weather.description || '';
      if (data.weather.icon) {
        els.icon.src = `https://openweathermap.org/img/wn/${data.weather.icon}@2x.png`;
        els.icon.classList.remove('hidden');
      } else {
        els.icon.classList.add('hidden');
      }

      // 추천
      els.range.textContent = data.recommendation.range;
      els.chips.innerHTML = '';
      (data.recommendation.items || []).forEach((item) => {
        const span = document.createElement('span');
        span.className = 'chip';
        span.textContent = item;
        els.chips.appendChild(span);
      });

      if (data.recommendation.tip) {
        els.tip.textContent = '💡 ' + data.recommendation.tip;
        els.tip.classList.remove('hidden');
      } else {
        els.tip.classList.add('hidden');
      }

      // 갱신 시각
      if (data.updatedAt) {
        const t = new Date(data.updatedAt);
        els.updated.textContent = '업데이트: ' + t.toLocaleString('ko-KR');
        els.updated.classList.remove('hidden');
      }

      els.result.classList.remove('hidden');
      els.loading.classList.add('hidden');
      els.error.classList.add('hidden');
      els.btn.disabled = false;
    }

    // 서버에서 추천 데이터를 가져온다. coords가 있으면 쿼리로 전달.
    async function fetchRecommendation(coords) {
      let url = '/recommend';
      if (coords) {
        url += `?lat=${encodeURIComponent(coords.lat)}&lon=${encodeURIComponent(coords.lon)}`;
      }
      let res;
      try {
        res = await fetch(url);
      } catch (e) {
        // 네트워크/오프라인
        throw new Error('서버에 연결할 수 없어요. 네트워크 상태를 확인해 주세요.');
      }
      let data;
      try {
        data = await res.json();
      } catch (e) {
        throw new Error('서버 응답을 해석하지 못했어요. 잠시 후 다시 시도해 주세요.');
      }
      if (!res.ok || !data.success) {
        throw new Error(data && data.message ? data.message : '옷차림 정보를 불러오지 못했어요.');
      }
      return data;
    }

    // 전체 흐름: geolocation 시도 → 좌표 있으면 그걸로, 없으면 서버 IP 폴백.
    function start() {
      showLoading('위치 정보를 확인하는 중...');

      const callServer = (coords, loadingMsg) => {
        showLoading(loadingMsg);
        fetchRecommendation(coords)
          .then(render)
          .catch((err) => showError(err.message));
      };

      if (!('geolocation' in navigator)) {
        // 브라우저가 geolocation 미지원 → 서버 IP 폴백
        callServer(null, '대략적인 위치(IP)로 날씨를 불러오는 중...');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          // GPS 성공 → 좌표로 정확히 조회
          callServer(
            { lat: pos.coords.latitude, lon: pos.coords.longitude },
            '현재 위치의 날씨를 불러오는 중...'
          );
        },
        () => {
          // 거부/실패 → 서버 IP 폴백
          callServer(null, '위치 권한이 없어 대략적인 위치(IP)로 불러오는 중...');
        },
        { enableHighAccuracy: false, timeout: 8000, maximumAge: 5 * 60 * 1000 }
      );
    }

    els.btn.addEventListener('click', start);
    start();
  </script>
</body>
</html>
