<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실시간 코인 시세 대시보드</title>

  <!-- Tailwind CSS (CDN, 빌드 없음) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 + ReactDOM (개발용 UMD 빌드) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel standalone (브라우저에서 JSX 변환) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 가격 변동 플래시 애니메이션 (보너스) */
    @keyframes flash-up {
      0%   { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.0); }
      30%  { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.55); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.0); }
    }
    @keyframes flash-down {
      0%   { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.0); }
      30%  { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.55); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.0); }
    }
    .flash-up   { animation: flash-up 1.1s ease-out; }
    .flash-down { animation: flash-down 1.1s ease-out; }

    /* 스켈레톤 쉬머 */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #1f2937 25%, #374151 37%, #1f2937 63%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    body { background-color: #0b1120; }
  </style>
</head>
<body class="text-slate-100">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    // 가격 포맷: 1달러 이상은 소수점 2자리, 1달러 미만(예: 도지)은 의미 있는 소수점까지.
    function formatPrice(value) {
      if (value == null || isNaN(value)) return '—';
      const digits = value >= 1 ? 2 : value >= 0.01 ? 4 : 6;
      return '$' + value.toLocaleString('en-US', {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits,
      });
    }

    // 등락률 포맷
    function formatChange(value) {
      if (value == null || isNaN(value)) return '—';
      const sign = value > 0 ? '+' : '';
      return sign + value.toFixed(2) + '%';
    }

    // 업데이트 시각 포맷 (한국 로케일)
    function formatTime(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleTimeString('ko-KR', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
        });
      } catch (e) {
        return '';
      }
    }

    // ---- 코인 카드 ----
    function CoinCard({ coin, flash }) {
      const up = (coin.change24h ?? 0) >= 0;

      // 24시간 등락률 기준 색상 판정
      const accentText = up ? 'text-emerald-400' : 'text-rose-400';
      const accentBorder = up ? 'border-emerald-500/40' : 'border-rose-500/40';
      const accentTint = up ? 'from-emerald-500/10' : 'from-rose-500/10';
      const arrow = up ? '▲' : '▼';

      const flashClass = flash === 'up' ? 'flash-up' : flash === 'down' ? 'flash-down' : '';

      return (
        <div
          className={
            'relative overflow-hidden rounded-2xl border ' + accentBorder +
            ' bg-gradient-to-br ' + accentTint +
            ' to-slate-900/60 bg-slate-900/70 p-6 shadow-xl shadow-black/40 ' +
            'transition-transform duration-200 hover:-translate-y-1 hover:shadow-2xl ' + flashClass
          }
        >
          {coin.rank != null && (
            <span className="absolute right-3 top-3 rounded-md bg-white/5 px-2 py-0.5 text-xs font-semibold text-slate-400 ring-1 ring-white/10">
              #{coin.rank}
            </span>
          )}
          <div className="flex items-center gap-4">
            <img
              src={coin.image}
              alt={coin.name}
              className="h-12 w-12 rounded-full bg-white/5 ring-1 ring-white/10"
              onError={(e) => { e.currentTarget.style.visibility = 'hidden'; }}
            />
            <div>
              <h2 className="text-lg font-bold leading-tight">{coin.name}</h2>
              <span className="text-sm font-medium uppercase tracking-wide text-slate-400">
                {coin.symbol}
              </span>
            </div>
          </div>

          <div className="mt-6">
            <div className="text-3xl font-extrabold tracking-tight">
              {formatPrice(coin.price)}
            </div>
            <div className={'mt-2 flex items-center gap-1.5 text-base font-semibold ' + accentText}>
              <span aria-hidden="true">{arrow}</span>
              <span>{formatChange(coin.change24h)}</span>
              <span className="text-xs font-normal text-slate-500">(24시간)</span>
            </div>
          </div>
        </div>
      );
    }

    // ---- 스켈레톤 카드 ----
    function SkeletonCard() {
      return (
        <div className="rounded-2xl border border-slate-700/40 bg-slate-900/70 p-6 shadow-xl">
          <div className="flex items-center gap-4">
            <div className="skeleton h-12 w-12 rounded-full" />
            <div className="flex-1 space-y-2">
              <div className="skeleton h-4 w-24 rounded" />
              <div className="skeleton h-3 w-12 rounded" />
            </div>
          </div>
          <div className="mt-6 space-y-3">
            <div className="skeleton h-8 w-32 rounded" />
            <div className="skeleton h-4 w-20 rounded" />
          </div>
        </div>
      );
    }

    // ---- 에러 상태 ----
    function ErrorState({ message, onRetry }) {
      return (
        <div className="col-span-full rounded-2xl border border-rose-500/40 bg-rose-500/5 p-8 text-center">
          <div className="text-4xl">⚠️</div>
          <p className="mt-3 text-lg font-semibold text-rose-300">{message}</p>
          <button
            onClick={onRetry}
            className="mt-5 rounded-xl bg-rose-500/90 px-5 py-2.5 font-semibold text-white transition hover:bg-rose-500"
          >
            다시 시도
          </button>
        </div>
      );
    }

    // ---- 새로고침 아이콘 ----
    function RefreshIcon({ spinning }) {
      return (
        <svg
          className={'h-5 w-5 ' + (spinning ? 'animate-spin' : '')}
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        >
          <path d="M21 12a9 9 0 1 1-2.64-6.36" />
          <polyline points="21 3 21 9 15 9" />
        </svg>
      );
    }

    // ---- 메인 앱 ----
    function App() {
      const [coins, setCoins] = useState([]);
      const [updatedAt, setUpdatedAt] = useState(null);
      const [loading, setLoading] = useState(true);   // 최초/전체 로딩 (스켈레톤)
      const [refreshing, setRefreshing] = useState(false); // 버튼 새로고침
      const [error, setError] = useState(null);
      const [query, setQuery] = useState(''); // 검색어
      // 카드별 플래시 상태: { [id]: 'up' | 'down' }
      const [flashes, setFlashes] = useState({});

      // 직전 가격을 보관해 플래시 판정에 사용
      const prevPricesRef = useRef({});
      const flashTimerRef = useRef(null);

      const fetchPrices = useCallback(async (isRefresh) => {
        if (isRefresh) setRefreshing(true);
        else setLoading(true);
        setError(null);

        try {
          const res = await fetch('/api/prices');
          const data = await res.json().catch(() => null);

          if (!res.ok || !data || !data.success) {
            const msg = (data && data.message) || '시세를 불러오지 못했어요. 잠시 후 다시 시도해 주세요.';
            throw new Error(msg);
          }

          const nextCoins = Array.isArray(data.coins) ? data.coins : [];

          // 직전 가격과 비교해 플래시 판정 (새로고침 시에만)
          if (isRefresh) {
            const prev = prevPricesRef.current;
            const newFlashes = {};
            for (const c of nextCoins) {
              const before = prev[c.id];
              if (before != null && c.price != null) {
                if (c.price > before) newFlashes[c.id] = 'up';
                else if (c.price < before) newFlashes[c.id] = 'down';
              }
            }
            if (Object.keys(newFlashes).length > 0) {
              setFlashes(newFlashes);
              if (flashTimerRef.current) clearTimeout(flashTimerRef.current);
              flashTimerRef.current = setTimeout(() => setFlashes({}), 1200);
            }
          }

          // 가격 스냅샷 갱신
          const snapshot = {};
          for (const c of nextCoins) snapshot[c.id] = c.price;
          prevPricesRef.current = snapshot;

          setCoins(nextCoins);
          setUpdatedAt(data.updatedAt || new Date().toISOString());
        } catch (err) {
          // fetch 자체 실패(TypeError)는 네트워크/오프라인 문제로 처리
          const msg =
            err instanceof TypeError
              ? '서버에 연결할 수 없어요. 네트워크 상태를 확인하고 다시 시도해 주세요.'
              : err.message;
          setError(msg);
        } finally {
          setLoading(false);
          setRefreshing(false);
        }
      }, []);

      // 페이지 로드 시 최초 fetch
      useEffect(() => {
        fetchPrices(false);
        return () => {
          if (flashTimerRef.current) clearTimeout(flashTimerRef.current);
        };
      }, [fetchPrices]);

      // 검색어로 필터링 (이름 또는 심볼, 대소문자 무시)
      const q = query.trim().toLowerCase();
      const visibleCoins = q
        ? coins.filter(
            (c) =>
              (c.name && c.name.toLowerCase().includes(q)) ||
              (c.symbol && c.symbol.toLowerCase().includes(q))
          )
        : coins;

      return (
        <div className="mx-auto min-h-screen max-w-7xl px-5 py-10">
          {/* 헤더 */}
          <header className="mb-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
            <div>
              <h1 className="flex items-center gap-2 text-3xl font-extrabold tracking-tight sm:text-4xl">
                <span>💰</span>
                <span>실시간 코인 시세 대시보드</span>
              </h1>
              <p className="mt-2 text-sm text-slate-400">
                {updatedAt
                  ? <>마지막 업데이트: <span className="font-medium text-slate-300">{formatTime(updatedAt)}</span></>
                  : '시세를 불러오는 중...'}
              </p>
            </div>

            <button
              onClick={() => fetchPrices(true)}
              disabled={loading || refreshing}
              className={
                'inline-flex items-center justify-center gap-2 rounded-xl px-5 py-2.5 ' +
                'font-semibold text-white shadow-lg transition ' +
                'bg-indigo-600 hover:bg-indigo-500 ' +
                'disabled:cursor-not-allowed disabled:opacity-60'
              }
            >
              <RefreshIcon spinning={refreshing} />
              <span>{refreshing ? '갱신 중...' : '새로고침'}</span>
            </button>
          </header>

          {/* 검색 */}
          <div className="mb-6">
            <div className="relative">
              <span className="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">🔍</span>
              <input
                type="text"
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="코인 검색 (이름 또는 심볼 — 예: bitcoin, btc)"
                className={
                  'w-full rounded-xl border border-slate-700/60 bg-slate-900/70 py-3 pl-11 pr-11 ' +
                  'text-base text-slate-100 placeholder-slate-500 outline-none transition ' +
                  'focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30'
                }
              />
              {query && (
                <button
                  onClick={() => setQuery('')}
                  className="absolute right-3 top-1/2 -translate-y-1/2 rounded-md px-2 py-1 text-slate-400 transition hover:bg-white/5 hover:text-slate-200"
                  aria-label="검색어 지우기"
                >
                  ✕
                </button>
              )}
            </div>
            {!loading && !error && (
              <p className="mt-2 text-xs text-slate-500">
                {query
                  ? `"${query}" 검색 결과 ${visibleCoins.length}개`
                  : `시가총액 상위 ${coins.length}개 코인`}
              </p>
            )}
          </div>

          {/* 본문 */}
          <main className="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
            {loading ? (
              Array.from({ length: 12 }).map((_, i) => <SkeletonCard key={i} />)
            ) : error ? (
              <ErrorState message={error} onRetry={() => fetchPrices(false)} />
            ) : visibleCoins.length === 0 ? (
              <div className="col-span-full rounded-2xl border border-slate-700/40 bg-slate-900/50 p-10 text-center">
                <div className="text-4xl">🔍</div>
                <p className="mt-3 text-lg font-semibold text-slate-300">
                  "{query}" 와 일치하는 코인이 없어요.
                </p>
                <p className="mt-1 text-sm text-slate-500">
                  시가총액 상위 {coins.length}개 코인 중에서 검색됩니다. 이름이나 심볼을 다시 확인해 주세요.
                </p>
                <button
                  onClick={() => setQuery('')}
                  className="mt-5 rounded-xl bg-slate-700 px-5 py-2.5 font-semibold text-white transition hover:bg-slate-600"
                >
                  검색 초기화
                </button>
              </div>
            ) : (
              visibleCoins.map((coin) => (
                <CoinCard key={coin.id} coin={coin} flash={flashes[coin.id]} />
              ))
            )}
          </main>

          {/* 푸터 */}
          <footer className="mt-10 text-center text-xs text-slate-600">
            시세 제공: CoinGecko · 카드 색상은 24시간 등락률 기준입니다.
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
