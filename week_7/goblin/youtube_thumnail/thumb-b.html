<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1920px; height: 1080px; overflow: hidden; background: #0B0E14; }

  .stage { position: relative; width: 1920px; height: 1080px; overflow: hidden;
           display: flex; flex-direction: column; align-items: center; justify-content: center;
           word-break: keep-all; }

  /* 배경: 좌상(중국=적) / 우하(한국=황) 대각 분할 — 카피의 대비를 공간으로 번역 */
  .glow {
    position: absolute; inset: 0;
    background:
      radial-gradient(95% 80% at 12% 8%,  rgba(230,0,18,.40)  0%, rgba(230,0,18,.07) 45%, rgba(0,0,0,0) 70%),
      radial-gradient(95% 80% at 88% 96%, rgba(255,193,0,.28) 0%, rgba(255,193,0,.05) 45%, rgba(0,0,0,0) 70%);
  }
  .grid {
    position: absolute; inset: 0; opacity: .10;
    background-image:
      linear-gradient(rgba(255,255,255,.55) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.55) 1px, transparent 1px);
    background-size: 96px 96px;
    mask-image: radial-gradient(85% 75% at 50% 50%, #000 30%, transparent 80%);
  }
  .vignette {
    position: absolute; inset: 0;
    background: radial-gradient(115% 85% at 50% 50%, transparent 42%, rgba(0,0,0,.78) 100%);
  }

  .inner { position: relative; text-align: center; }

  .kicker {
    display: inline-flex; align-items: center; gap: 14px;
    font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 44px;
    letter-spacing: .01em; color: #fff;
    background: #E60012; padding: 15px 28px; border-radius: 8px;
    margin-bottom: 46px;
  }
  .kicker b { font-weight: 900; }

  .line {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 216px; line-height: 1.06; color: #fff;
    letter-spacing: -.025em;
    -webkit-text-stroke: 12px #0B0E14;
    paint-order: stroke fill;          /* ← 없으면 한글 자소가 메워진다 (thumnail.md §4) */
    text-shadow: 0 12px 34px rgba(0,0,0,.6);
    white-space: nowrap;
  }
  /* 강조 블록: 빨강은 글자색이 아니라 '형광펜'으로 (thumnail.md §5) */
  .tag {
    display: inline-block; padding: 0 .13em; border-radius: 12px;
    -webkit-text-stroke: 0;            /* 블록 안에서는 외곽선 불필요 */
    margin-left: .06em;
  }
  .cn { background: #E60012; color: #fff; }
  .kr { background: #FFE100; color: #0B0E14; }

  .divider {
    display: flex; align-items: center; justify-content: center; gap: 30px;
    margin: 24px 0 20px;
  }
  .divider span { height: 5px; width: 300px; background: rgba(255,255,255,.26); border-radius: 3px; }
  .divider em {
    font-family: 'Pretendard', sans-serif; font-style: normal; font-weight: 900;
    font-size: 46px; color: rgba(255,255,255,.62); letter-spacing: .06em;
  }

  .sub {
    margin-top: 52px;
    font-family: 'Pretendard', sans-serif; font-weight: 800; font-size: 54px;
    color: #DCE2EA; letter-spacing: -.01em;
    text-shadow: 0 6px 18px rgba(0,0,0,.75);
  }
  .sub i { font-style: normal; color: #FFE100; }
</style>

<div class="stage">
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="vignette"></div>

  <div class="inner">
    <div class="kicker">KBS 다큐 인사이트 · <b>인재전쟁 2</b></div>

    <div class="line">공대에 미친 <span class="tag cn">중국</span></div>
    <div class="divider"><span></span><em>VS</em><span></span></div>
    <div class="line">의대에 미친 <span class="tag kr">한국</span></div>

    <div class="sub">최태원 회장이 답하다 · <i>AI 시대 생존 전략</i></div>
  </div>
</div>
