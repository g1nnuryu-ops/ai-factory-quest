<!doctype html>
<html lang="ko">
<meta charset="utf-8">
<title>메이드 인 코리아 — FAN-MADE POSTER</title>
<link rel="icon" href="data:,">
<style>
/* ============================================================
   〈메이드 인 코리아〉 팬메이드 포스터
   1000 x 1500 CSS px  →  headless Chrome @2x  →  2000 x 3000
   컨셉: "얼굴 없는 세 남자" — 세 인물 모두 얼굴이 보이지 않는다.
   이미지 3장 전부 AI(fal.ai) 생성물. 공식 스틸(source/) 미사용.
   ============================================================ */

:root{
  --bg:      #0A0B0D;   /* 배경 흑 — 청회색이 도는 검정 */
  --deep:    #16181C;   /* 띠 경계선 */
  --gold:    #C9A227;   /* 타이틀 금 */
  --gold-hi: #E8C766;   /* 금 하이라이트 */
  --gold-lo: #8E6F1A;
  --cool:    #7C8C9C;   /* 냉광 — 장건영 */
  --warm:    #C08A3E;   /* 온광 — 백기태 */
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1000px;height:1500px;background:var(--bg);overflow:hidden}

.poster{
  position:relative;
  width:1000px;height:1500px;
  background:var(--bg);
  overflow:hidden;
}

/* ============================================================
   §3  대각(-8°) 3분할 — clip-path 로 띠를 자른다
   경계선 공칭 y :  B1=560  B2=930  B3=1190
   -8° → 1000px 폭에서 ±70px  (tan8° x 1000 / 2 = 70.25)
   ============================================================ */

.band{position:absolute;inset:0;overflow:hidden}
.band img{position:absolute;display:block;border:0}
.band .tone{position:absolute;inset:0}   /* 색온도 틴트 */
.band .shade{position:absolute;inset:0}  /* 띠 내부 명암 */

/* ── 띠 ① 백기태 (권력) ─ 창 역광 순흑 실루엣 · 태극기 ─────────
      0 → B1        (전체 높이의 ~37%)                            */
.b1{
  z-index:1;
  clip-path:polygon(0px 0px, 1000px 0px, 1000px 490px, 0px 630px);
}
/* 크게 물려 창이 상단으로 풀블리드 → 책상/전화기 잡동사니는 프레임 밖으로 */
.b1 img{
  width:1706px;height:952px;left:-334px;top:-125px;
  /* contrast 를 brightness 보다 먼저 걸어야 창이 재차 날아가지 않는다 */
  /* 창은 밝아야 한다 — 역광이 죽으면 실루엣이 실루엣으로 안 읽힌다 */
  filter:saturate(.42) contrast(1.25) brightness(.95) sepia(.12);
}
.b1 .tone{                       /* 온광 #C08A3E 기미 */
  background:var(--warm);opacity:.16;mix-blend-mode:soft-light;
}
/* ⚠ .shade 는 inset:0 = 1000x1500 포스터 전체 좌표계다.
   따라서 스톱을 % 가 아니라 포스터 절대 px 로 찍는다 (띠 로컬 좌표 아님) */
.b1 .shade{
  background:
    radial-gradient(620px 430px at 545px 300px,
        rgba(10,11,13,0) 0%, rgba(10,11,13,.16) 60%, rgba(10,11,13,.62) 100%),
    linear-gradient(180deg,
        rgba(10,11,13,.94) 0px,    /* 날아간 창을 상단에서 롤오프 */
        rgba(10,11,13,.38) 62px,
        rgba(10,11,13,0)   170px,
        rgba(10,11,13,0)   430px,
        rgba(10,11,13,.55) 645px);
}

/* ── 띠 ② 백기현 (장성) ─ 뒤통수 · 별 계급장 · 지도 ────────────
      B1 → B2       (~25%)                                        */
.b2{
  z-index:2;
  clip-path:polygon(0px 630px, 1000px 490px, 1000px 860px, 0px 1000px);
}
/* 좌측으로 밀어 지그재그 스태거. 별 계급장은 B2 절단선 위에 안전하게 남는다 */
.b2 img{
  width:1478px;height:825px;left:-345px;top:340px;
  /* 원본이 앰버+틸로 가장 화려하다. 가장 세게 누른다 — 지도는 질감이지 주인공이 아니다 */
  /* 원본의 강한 초록/틸이 3장 중 유일한 톤 이탈이었다.
     채도를 더 내리고 sepia 로 카키 쪽으로 당겨 ①·③과 한 세계로 묶는다 */
  filter:saturate(.18) contrast(1.28) brightness(.86) sepia(.16);
}
.b2 .tone{                       /* 형(온광)과 추적자(냉광) 사이 — 좌 온 / 우 냉 */
  background:linear-gradient(100deg, rgba(192,138,62,.20) 0%, rgba(154,143,122,.10) 46%, rgba(124,140,156,.20) 100%);
  mix-blend-mode:soft-light;
}
.b2 .shade{
  background:
    radial-gradient(560px 350px at 430px 770px,
        rgba(10,11,13,0) 0%, rgba(10,11,13,.18) 58%, rgba(10,11,13,.70) 100%),
    linear-gradient(180deg,
        rgba(10,11,13,0)   455px,
        rgba(10,11,13,.52) 505px,  /* cut1 바로 아래를 눌러 절단면을 만든다 */
        rgba(10,11,13,0)   625px,
        rgba(10,11,13,0)   890px,
        rgba(10,11,13,.50) 1015px);
}

/* ── 띠 ③ 장건영 (추적자) ─ 등을 돌림 · 수사 자료판 ────────────
      B2 → B3       (~18%)                                        */
.b3{
  z-index:3;
  clip-path:polygon(0px 1000px, 1000px 860px, 1000px 1120px, 0px 1260px);
}
.b3 img{
  width:1560px;height:871px;left:-70px;top:690px;
  /* v2a(아웃포커스 자료판)로 교체 — 원본의 깨진 AI 글자를 제거했다.
     v2a 는 원본보다 밝고 채도가 높으므로 더 세게 누른다.
     채도를 거의 0 까지 — 자료판의 붉은 실이 완전히 회청색으로 죽는다.
     화면의 유일한 red 는 ①의 태극기여야 한다 */
  filter:saturate(.09) contrast(1.30) brightness(.62);
}
.b3 .tone{                       /* 냉광 #7C8C9C 기미 */
  background:var(--cool);opacity:.24;mix-blend-mode:soft-light;
}
.b3 .shade{
  background:
    radial-gradient(540px 320px at 545px 1030px,
        rgba(10,11,13,0) 0%, rgba(10,11,13,.18) 56%, rgba(10,11,13,.70) 100%),
    linear-gradient(180deg,
        rgba(10,11,13,0)   830px,
        rgba(10,11,13,.55) 885px,  /* cut2 바로 아래 */
        rgba(10,11,13,0)   1000px,
        rgba(10,11,13,.18) 1090px);
}

/* ── 띠 경계 — 딥그레이 선 + 그림자로 물리적 분리감 ────────────
      box-shadow 는 회전된 로컬 좌표계에서 나가므로
      절단면에 수직으로 그림자가 드리운다                        */
.cut{
  position:absolute;left:50%;width:1260px;height:2px;z-index:4;
  transform:translate(-50%,-50%) rotate(-8deg);
  background:var(--deep);
  box-shadow:
     0 1px 0 rgba(232,199,102,.05),
     0 12px 30px rgba(0,0,0,.95),
     0 -10px 26px rgba(0,0,0,.80);
}
.cut1{top:560px}
.cut2{top:930px}
.cut3{top:1190px}

/* ── 전역 비네트 ──────────────────────────────────────────── */
.vignette{
  position:absolute;inset:0;z-index:5;
  background:radial-gradient(118% 78% at 50% 40%,
      rgba(10,11,13,0) 42%, rgba(10,11,13,.30) 74%,
      rgba(10,11,13,.70) 92%, rgba(10,11,13,.92) 100%);
}

/* ── 좌우 가장자리 암부 ────────────────────────────────────────
      ②의 타자기·스탠드, ③의 블라인드가 여백으로 새어나오는 걸 막는다.
      단, ①의 태극기(x≈54~212)를 죽이면 안 되므로 45px 이후로 급히 푼다   */
.edges{
  position:absolute;inset:0;z-index:5;
  background:
    linear-gradient( 90deg, rgba(10,11,13,.86) 0px, rgba(10,11,13,.30) 46px, rgba(10,11,13,0) 132px),
    linear-gradient(270deg, rgba(10,11,13,.86) 0px, rgba(10,11,13,.30) 46px, rgba(10,11,13,0) 132px);
}

/* ── 하단 암부 — 타이틀 존을 만든다 ───────────────────────────
      y≈1190 부터는 사실상 순흑 → 그 위에 텍스트를 얹는다        */
.veil{
  position:absolute;inset:0;z-index:6;
  background:linear-gradient(180deg,
      rgba(10,11,13,0)    62%,   /*  930 */
      rgba(10,11,13,.22)  70%,   /* 1050 */
      rgba(10,11,13,.62)  75%,   /* 1125 */
      rgba(10,11,13,.92)  78.5%, /* 1178 */
      rgba(10,11,13,.99)  81%,   /* 1215 */
      var(--bg)           83%    /* 1245 — 타이틀 블록(y≈1189~)은 사실상 순흑 위 */
  );
}

/* ============================================================
   §6  타이포 — 전부 CSS 텍스트 (AI 생성 이미지 아님)
   HYGothic-Extra(견고딕) · Franklin Gothic Demi Cond
   ※ letter-spacing 은 마지막 글자 뒤에도 붙으므로
     같은 값의 text-indent 로 중앙정렬을 보정한다
   ============================================================ */

.title-zone{
  position:absolute;left:0;right:0;bottom:0;z-index:7;
  padding:0 60px 36px;              /* 세이프 마진 */
  text-align:center;
}

/* 영문 부제 — 작게, 자간 아주 넓게, 대문자 */
.eng{
  font-family:'Franklin Gothic Demi Cond','Franklin Gothic Demi',sans-serif;
  font-size:13px;line-height:1;
  letter-spacing:.42em;text-indent:.42em;
  text-transform:uppercase;
  color:#A08F63;
  margin-bottom:12px;
}

/* 한글 제목 — 크게, 무겁게, 금색 그라데이션 */
.kor{
  font-family:'HYGothic-Extra','HYHeadLine-Medium','Noto Sans KR','Malgun Gothic',sans-serif;
  font-weight:400;                  /* 견고딕은 이미 Extra — 합성 볼드 방지 */
  font-size:74px;line-height:1;
  letter-spacing:.08em;text-indent:.08em;
  background:linear-gradient(180deg,
      var(--gold-hi) 0%, #DCB94F 34%, var(--gold) 62%, var(--gold-lo) 100%);
  -webkit-background-clip:text;background-clip:text;
  color:transparent;
  filter:drop-shadow(0 4px 14px rgba(0,0,0,.9)) drop-shadow(0 0 1px rgba(0,0,0,.6));
}

.rule{
  width:320px;height:1px;margin:16px auto 13px;
  background:linear-gradient(90deg, transparent, rgba(201,162,39,.55) 30%,
                                    rgba(201,162,39,.55) 70%, transparent);
}
.rule.b{margin:13px auto 18px}

/* §7 A안 카피 */
.copy{
  font-family:'Noto Sans KR','Malgun Gothic',sans-serif;
  font-weight:500;
  font-size:19px;line-height:1.25;
  letter-spacing:.20em;text-indent:.20em;
  color:#C2B8A6;
}

/* 크레딧 (SERIES.md) */
.credit{
  font-family:'Noto Sans KR','Malgun Gothic',sans-serif;
  font-weight:400;
  font-size:11.5px;line-height:1.6;
  letter-spacing:.10em;text-indent:.10em;
  color:#7C7568;
}
.credit b{font-weight:500;color:#9A9184}

/* 🔴 필수 고지 — 작게, 그러나 분명히 읽히게 */
.notice{margin-top:16px}
.notice .hair{
  width:180px;height:1px;margin:0 auto 11px;
  background:rgba(160,143,99,.28);
}
.notice .fan{
  font-family:'Franklin Gothic Demi Cond','Franklin Gothic Demi',sans-serif;
  font-size:12.5px;line-height:1.4;
  letter-spacing:.26em;text-indent:.26em;
  text-transform:uppercase;
  color:#BDAC80;
}
.notice .ai{
  margin-top:4px;
  font-family:'Noto Sans KR','Malgun Gothic',sans-serif;
  font-weight:400;
  font-size:11px;line-height:1.5;
  letter-spacing:.02em;
  color:#8E8574;
}

/* ============================================================
   그레인 / 인쇄 노이즈 — 인라인 SVG feTurbulence (외부 파일 X)
   타이틀 위까지 덮어 한 장의 인쇄물처럼 묶는다
   ============================================================ */
.grain{
  position:absolute;inset:0;z-index:9;pointer-events:none;
  opacity:.21;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
}
/* 거친 입자 한 겹 더 — 업스케일 뭉개짐을 덮는다 */
.grain2{
  position:absolute;inset:0;z-index:9;pointer-events:none;
  opacity:.07;mix-blend-mode:soft-light;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='340' height='340'><filter id='m'><feTurbulence type='fractalNoise' baseFrequency='0.32' numOctaves='2' stitchTiles='stitch'/></filter><rect width='340' height='340' filter='url(%23m)'/></svg>");
}
</style>

<div class="poster">

  <!-- 띠 ① 백기태 — 창 역광 순흑 실루엣. 얼굴 없음. 정면으로 관객을 마주본다 -->
  <div class="band b1">
    <img src="generated/01-baek-gitae-v2.jpg" alt="">
    <div class="tone"></div>
    <div class="shade"></div>
  </div>

  <!-- 띠 ② 백기현 — 뒤통수/어깨너머. 별 계급장. 등을 돌려 지도를 본다 -->
  <div class="band b2">
    <img src="generated/02-baek-gihyun.jpg" alt="">
    <div class="tone"></div>
    <div class="shade"></div>
  </div>

  <!-- 띠 ③ 장건영 — 등을 완전히 돌림. 수사 자료판을 마주본다 (v2a: 아웃포커스, 깨진 글자 제거) -->
  <div class="band b3">
    <img src="generated/03-jang-gunyoung-v2a.jpg" alt="">
    <div class="tone"></div>
    <div class="shade"></div>
  </div>

  <div class="cut cut1"></div>
  <div class="cut cut2"></div>
  <div class="cut cut3"></div>

  <div class="vignette"></div>
  <div class="edges"></div>
  <div class="veil"></div>

  <div class="title-zone">
    <div class="eng">Made in Korea</div>
    <div class="kor">메이드 인 코리아</div>

    <div class="rule"></div>
    <div class="copy">국가는 그의 사업이었다</div>
    <div class="rule b"></div>

    <div class="credit">
      <div>연출 <b>우민호</b> &nbsp;·&nbsp; 출연 <b>현빈 · 정우성 · 우도환</b> · 조여정 · 서은수 · 원지안</div>
      <div>각본 박은교 박준석 &nbsp;·&nbsp; 음악 조영욱 &nbsp;·&nbsp; 제작 하이브미디어코프 · 젬스톤픽쳐스 &nbsp;·&nbsp; DISNEY+ 오리지널 시리즈</div>
    </div>

    <div class="notice">
      <div class="hair"></div>
      <div class="fan">Fan-made poster &nbsp;·&nbsp; Not official</div>
      <div class="ai">AI로 생성한 이미지이며 실제 드라마 스틸이 아닙니다 · Disney+와 무관한 비공식 팬 창작물</div>
    </div>
  </div>

  <div class="grain"></div>
  <div class="grain2"></div>
</div>
