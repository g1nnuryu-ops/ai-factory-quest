<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>계영배 대관 광고 카드</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #0A0708;   /* 딥 블랙 — 피드 57% */
    --ink:    #F2EDE7;   /* 웜 오프화이트 — 대비 17.24:1 */
    --accent: #BFA380;   /* 앰버 샌드 — 대비 8.37:1 */
    --dim:    #8C7D76;
    /* 레드(#F00902)는 CSS로 칠하지 않는다. 사진 속 네온이 그 역할을 한다 */
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1080px; background:var(--bg); }
  body { font-family:'Pretendard', sans-serif; -webkit-font-smoothing:antialiased; }

  .card { position:relative; width:1080px; height:1080px; background:var(--bg); overflow:hidden; }

  /* ── 비주얼 61% ───────────────────────────── */
  .hero { position:absolute; inset:0 0 auto 0; height:657px; }
  .hero img { width:1080px; height:657px; object-fit:cover; display:block; }
  /* 사진 하단을 배경색으로 녹인다 — 딱 잘린 선은 싸 보인다 (card.md §4-A) */
  .hero::after {
    content:""; position:absolute; left:0; right:0; bottom:0; height:190px;
    background:linear-gradient(180deg, rgba(10,7,8,0) 0%, rgba(10,7,8,.72) 55%, var(--bg) 100%);
  }

  /* ── 카피 밴드 39% ────────────────────────── */
  .band {
    position:absolute; left:0; right:0; bottom:0; height:423px;
    padding:40px 96px 48px;            /* 바깥 여백 96px (card.md §5) */
    display:flex; flex-direction:column;
  }

  .kicker {
    font-family:'Cormorant Garamond', serif; font-weight:500;
    font-size:26px; letter-spacing:.34em; text-transform:uppercase;
    color:var(--accent);
  }

  .copy {
    margin-top:20px;
    font-weight:700; font-size:88px; line-height:1.22;
    letter-spacing:-.015em; color:var(--ink);
    word-break:keep-all;               /* 한국어 단어 중간 줄바꿈 방지 */
  }

  .foot {
    margin-top:auto; padding-top:26px;
    border-top:1px solid rgba(242,237,231,.13);
    display:flex; align-items:baseline; justify-content:space-between;
  }
  .cta     { font-size:38px; font-weight:600; color:var(--accent); letter-spacing:-.01em; }
  .cta .ar { margin-left:12px; }
  .handle  { font-size:26px; font-weight:400; color:var(--dim); letter-spacing:.01em; }
</style>
</head>
