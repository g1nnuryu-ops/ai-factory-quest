<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>놀담 · 실내 물놀이장 개장 포스터</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>🌊</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap');

  :root{
    --cream:#F6F1E7;
    --sage:#7C8B6B;
    --sage-deep:#66755A;
    --apricot:#E39A5C;
    --aqua:#00B4D8;
    --aqua-tint:#48CAE4;
    --ink:#3D3A34;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#d9d2c4;}
  body{display:flex;align-items:flex-start;justify-content:flex-start;}

  .board{
    position:relative;
    width:1080px;height:1350px;
    overflow:hidden;
    background:var(--cream);
    font-family:'Noto Sans KR','Malgun Gothic',sans-serif;
    word-break:keep-all;
    -webkit-font-smoothing:antialiased;
    text-rendering:geometricPrecision;
  }

  /* ---------- HERO PHOTO (top full-bleed ~65%) ---------- */
  .hero{
    position:absolute;left:0;top:0;
    width:1080px;height:876px;
    background-image:url('waterplay_photo.jpg');
    background-size:cover;
    background-position:center 78%;
  }
  /* soft top scrim so cream/white brand text stays legible over bright windows,
     kept light so the sunny water scene still sparkles */
  .scrim-top{
    position:absolute;left:0;top:0;width:1080px;height:260px;
    background:linear-gradient(180deg,
      rgba(34,46,32,.40) 0%,
      rgba(34,46,32,.16) 46%,
      rgba(34,46,32,0) 100%);
  }
  /* bottom cream fade — photo melts seamlessly into the copy band */
  .fade-bottom{
    position:absolute;left:0;top:712px;width:1080px;height:164px;
    background:linear-gradient(180deg,
      rgba(246,241,231,0) 0%,
      rgba(246,241,231,.38) 56%,
      rgba(246,241,231,.85) 84%,
      var(--cream) 100%);
  }

  /* ---------- BRAND (top-left, on photo) ---------- */
  .brand{position:absolute;left:60px;top:58px;z-index:5;}
  .brand .logo{
    font-family:'Gowun Batang',serif;
    font-weight:700;
    font-size:56px;
    color:#FBF8F1;
    letter-spacing:.01em;
    text-shadow:0 2px 10px rgba(28,38,26,.55),0 1px 2px rgba(28,38,26,.55);
    line-height:1;
  }
  .brand .logo .dot{color:#EFE9DB;font-weight:400;}
  .brand .logo .en{font-size:34px;letter-spacing:.06em;}
  .brand .kicker{
    margin-top:9px;
    font-size:19px;font-weight:700;letter-spacing:.44em;
    color:#F3EEE3;
    text-shadow:0 1px 7px rgba(28,38,26,.6);
    padding-left:.44em;
  }

  /* top-right event pill */
  .pill-top{
    position:absolute;right:58px;top:66px;z-index:5;
    display:flex;align-items:center;gap:11px;
    background:rgba(246,241,231,.92);
    border:1.5px solid rgba(124,139,107,.55);
    border-radius:999px;
    padding:11px 22px 11px 20px;
    box-shadow:0 4px 16px rgba(30,42,28,.22);
  }
  .pill-top .d{width:11px;height:11px;border-radius:50%;background:var(--apricot);}
  .pill-top span{
    font-size:20px;font-weight:800;color:var(--sage-deep);letter-spacing:.06em;
  }

  /* ---------- COPY BAND ---------- */
  .eyebrow{
    position:absolute;left:60px;top:796px;z-index:6;
    display:flex;align-items:center;gap:16px;
  }
  .eyebrow .rule{width:46px;height:3px;border-radius:2px;background:var(--apricot);}
  .eyebrow .txt{
    font-family:'Gowun Batang',serif;font-weight:700;
    font-size:33px;color:var(--ink);letter-spacing:.03em;
  }
  .eyebrow .mid{color:var(--apricot);margin:0 7px;font-weight:700;}

  .hero-word{
    position:absolute;left:52px;top:840px;z-index:6;
    font-weight:900;font-size:228px;line-height:.9;
    color:var(--aqua);
    letter-spacing:-.015em;
    text-shadow:0 6px 24px rgba(0,150,199,.18);
  }
  /* decorative water droplets (tint only — purely decorative splash) */
  .drop{position:absolute;z-index:6;border-radius:50% 50% 50% 0;
    background:var(--aqua-tint);transform:rotate(45deg);}
  .drop.d1{left:600px;top:876px;width:26px;height:26px;opacity:.9;}
  .drop.d2{left:646px;top:922px;width:16px;height:16px;opacity:.72;}
  .drop.d3{left:584px;top:942px;width:12px;height:12px;opacity:.62;}

  .subline{
    position:absolute;left:60px;top:1086px;z-index:6;
    font-weight:800;font-size:54px;color:var(--ink);letter-spacing:-.012em;
  }

  .info-rule{
    position:absolute;left:62px;top:1162px;z-index:6;
    width:54px;height:3px;border-radius:2px;background:rgba(61,58,52,.4);
  }
  /* price line — 정가 → 개장 특가(할인) */
  .price-line{
    position:absolute;left:60px;top:1190px;z-index:6;
    display:flex;align-items:baseline;
    font-size:29px;font-weight:600;color:var(--ink);letter-spacing:-.01em;
    font-variant-numeric:tabular-nums;
  }
  .price-line .lbl{font-weight:700;margin-right:15px;}
  .price-line .was{color:#A79F8E;text-decoration:line-through;text-decoration-thickness:2px;font-weight:600;font-size:26px;}
  .price-line .arrow{color:#B7B0A2;margin:0 13px;font-weight:800;}
  .price-line .now{color:var(--apricot);font-weight:900;font-size:36px;}

  /* period line */
  .period-line{
    position:absolute;left:60px;top:1264px;z-index:6;
    font-size:26px;font-weight:500;color:#7d766a;letter-spacing:-.005em;
    font-variant-numeric:tabular-nums;
  }
  .period-line b{color:var(--ink);font-weight:800;}

  /* ---------- CTA + SLOGAN ---------- */
  .cta{
    position:absolute;right:60px;top:1258px;z-index:6;
    display:flex;align-items:center;gap:18px;
  }
  .cta .pill{
    display:inline-flex;align-items:center;gap:12px;
    background:var(--ink);color:#FBF8F1;
    font-size:25px;font-weight:800;letter-spacing:.01em;
    padding:15px 30px;border-radius:999px;
    box-shadow:0 6px 18px rgba(61,58,52,.30);
  }
  .cta .pill .ic{font-size:22px;}
  .cta .handle{
    font-size:25px;font-weight:700;color:var(--ink);letter-spacing:.01em;
  }

  .slogan{
    position:absolute;left:60px;top:1298px;z-index:6;
    font-family:'Gowun Batang',serif;font-size:25px;color:#9a9384;letter-spacing:.05em;
  }
  .slogan b{color:var(--sage);font-weight:700;}
</style>
</head>
<body>
  <div class="board">
    <!-- photo -->
    <div class="hero"></div>
    <div class="scrim-top"></div>
    <div class="fade-bottom"></div>

    <!-- brand -->
    <div class="brand">
      <div class="logo">놀담 <span class="dot">·</span> <span class="en">Noldam</span></div>
      <div class="kicker">KIDS BRUNCH CAFE</div>
    </div>

    <!-- event pill -->
    <div class="pill-top"><span class="d"></span><span>여름 한정 · 개장</span></div>

    <!-- copy band -->
    <div class="eyebrow">
      <span class="rule"></span>
      <span class="txt">실내 물놀이장 개장 <span class="mid">·</span> 7.25 OPEN</span>
    </div>

    <div class="hero-word">첨벙!</div>
    <span class="drop d1"></span>
    <span class="drop d2"></span>
    <span class="drop d3"></span>

    <div class="subline">이번 여름은 실내에서.</div>

    <div class="info-rule"></div>
    <div class="price-line">
      <span class="lbl">개장 특가 · 아이 1인</span>
      <span class="was">22,000원</span>
      <span class="arrow">→</span>
      <span class="now">15,000원</span>
    </div>
    <div class="period-line">행사기간 <b>7.25 ~ 8.31</b></div>

    <!-- cta -->
    <div class="cta">
      <span class="pill"><span class="ic">✎</span>DM · 프로필 링크 예약</span>
      <span class="handle">@noldam_cafe</span>
    </div>

  </div>
</body>
</html>
