<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAPA 증명서 발급 시스템</title>

  <!-- ⚠️ 모든 CDN 버전 고정. @babel/standalone 은 반드시 7.x (7.26.4).
       Babel 8 은 인라인 JSX(type="text/babel") 변환을 깨뜨려 화면이 백지가 된다. -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

  <script>
    // Tailwind 테마 확장 — 앱 크롬은 Apple 스타일(시스템 폰트 + 차분한 블루 단일 강조색)
    tailwind.config = {
      theme: {
        extend: {
          colors: { apple: { blue: '#0071e3', blueDark: '#0077ed' } },
          fontFamily: {
            sans: ['-apple-system', 'SF Pro', 'Pretendard', 'Apple SD Gothic Neo', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #f5f5f7;
      font-family: -apple-system, "SF Pro", "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #1d1d1f;
    }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 11px; height: 11px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.18); border-radius: 10px; border: 3px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.32); background-clip: content-box; }

    /* ===========================================================
       증명서(공식 문서) — Apple 스타일을 적용하지 말 것. 격식 있는 RAPA 양식.
       내부 치수는 px 기준(A4 = 794 × 1123 px @96dpi)으로 미리보기/인쇄 동일.
       =========================================================== */
    .cert-page {
      width: 794px; height: 1123px; background: #fff; position: relative;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Pretendard", sans-serif;
      color: #111; border: 1px solid #e4e4e7; border-radius: 10px;
      box-shadow: 0 18px 50px rgba(0,0,0,.16); overflow: hidden;
    }
    .cert-inner { position: absolute; inset: 0; padding: 76px 80px 70px; display: flex; flex-direction: column; }
    .cert-no { font-weight: 700; font-size: 14.5px; letter-spacing: .02em; }

    .cert-header { display: flex; flex-direction: column; align-items: center; margin-top: 4px; }
    .org-ko { width: 100%; text-align: center; font-size: 25px; font-weight: 800; letter-spacing: .34em; text-indent: .34em; margin-top: 9px; color: #0b0b0c; }
    .org-en { width: 100%; text-align: center; font-size: 11px; letter-spacing: .12em; color: #6b7280; margin-top: 6px; }

    .award-eyebrow { width: 100%; text-align: center; font-size: 18px; letter-spacing: .5em; text-indent: .5em; color: #9aa0a6; margin-top: 36px; font-weight: 600; }
    .cert-title { width: 100%; text-align: center; font-size: 43px; font-weight: 800; letter-spacing: .54em; text-indent: .54em; margin: 30px 0 32px; color: #0b0b0c; }
    .cert-title.is-award { margin-top: 10px; }

    .cert-fields { margin: 6px 8px 4px; }
    .cf-row { display: flex; align-items: baseline; font-size: 16.5px; line-height: 2.1; }
    .cf-label { display: inline-block; width: 108px; text-align: justify; text-align-last: justify; font-weight: 600; }
    .cf-colon { margin: 0 14px 0 4px; }
    .cf-val { font-weight: 600; letter-spacing: .05em; }

    .cert-body { font-size: 16px; line-height: 1.95; text-align: justify; margin: 16px 8px 24px; word-break: keep-all; }

    .cert-table { width: 100%; border-collapse: collapse; margin-top: 2px; }
    .cert-table th, .cert-table td { border: 1px solid #4b4b4b; padding: 13px 12px; text-align: center; vertical-align: middle; }
    .cert-table th { background: #eef0f2; font-weight: 700; font-size: 15px; letter-spacing: .2em; text-indent: .2em; }
    .cert-table td { font-size: 15px; line-height: 1.5; }
    .cert-table .sub { font-size: 12.5px; color: #444; margin-top: 6px; }

    .cert-spacer     { flex: 1;   min-height: 24px; }  /* 표 ↔ 발급일 (중간 여백) */
    .cert-spacer-top { flex: .62; min-height: 14px; }  /* 번호 ↔ 로고 (상단 여백) */
    .cert-spacer-bot { flex: .5;  min-height: 12px; }  /* 직인 ↔ 페이지 끝 (하단 여백) */
    .issue-date { text-align: right; font-size: 16.5px; letter-spacing: .04em; margin-bottom: 18px; }
    .issuer-wrap { display: flex; justify-content: center; align-items: center; }
    .issuer { font-size: 28px; font-weight: 800; letter-spacing: .42em; text-indent: .42em; color: #0b0b0c; }
    .seal-pos { margin-left: -6px; transform: translateY(-4px); }

    /* 빨간 공식 직인(placeholder) — 한국전파진흥협회장 3×3 전서 배치(우→좌 열) */
    .seal { width: 116px; height: 116px; position: relative; transform: rotate(-7deg); opacity: .9; }
    .seal-grid { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); border: 4px solid #c1272d; border-radius: 13px; }
    .seal-grid span { display: flex; align-items: center; justify-content: center; color: #c1272d; font-family: "Batang", "AppleMyungjo", "Apple SD Gothic Neo", serif; font-weight: 800; font-size: 23px; }
    .seal-outline { position: absolute; inset: 6px; border: 1.5px solid #c1272d; border-radius: 9px; pointer-events: none; }
    .seal-img { width: 122px; height: 122px; object-fit: contain; transform: none; opacity: .95; mix-blend-mode: multiply; }
    /* 실제 로고(가로형 통합 락업: 마크+한국전파진흥협회+영문) */
    .logo-img { display: block; height: 62px; width: auto; max-width: 82%; object-fit: contain; margin: 4px auto 2px; }

    /* 애니메이션 */
    @keyframes toastIn { from { opacity: 0; transform: translateY(12px) scale(.97); } to { opacity: 1; transform: none; } }
    .toast-in { animation: toastIn .24s cubic-bezier(.2,.8,.2,1); }
    @keyframes panelIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .panel-in { animation: panelIn .14s ease-out; }

    /* ===== 인쇄/PDF: 증명서만 깨끗하게 A4로 ===== */
    @media print {
      @page { size: A4 portrait; margin: 0; }
      html, body { background: #fff !important; }
      .no-print { display: none !important; }
      body * { visibility: hidden !important; }
      #print-root, #print-root * { visibility: visible !important; }
      #print-root { position: absolute; left: 0; top: 0; width: 794px; }
      .cert-viewport { height: auto !important; overflow: visible !important; }
      .cert-scale { transform: none !important; width: 794px !important; }
      .cert-page { box-shadow: none !important; border: none !important; border-radius: 0 !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>

    const delay = (ms = 420) => new Promise((r) => setTimeout(r, ms));

    function todayStr() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
    }
    function formatIssueDate(iso) {
      if (!iso) return '';
      const [y, m, d] = iso.split('-');
      if (!y || !m || !d) return '';
      return `${y}년 ${m}월 ${d}일`;
    }
    // 생년월일: 2000.01.01 / 2000-01-01 / 20000101 → 2000.01.01 로 표준화
    function normalizeBirth(s) {
      if (!s) return '';
      const t = String(s).trim();
      let m;
      if ((m = t.match(/^(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})\.?$/)))
        return `${m[1]}.${m[2].padStart(2, '0')}.${m[3].padStart(2, '0')}`;
      if ((m = t.match(/^(\d{4})(\d{2})(\d{2})$/))) return `${m[1]}.${m[2]}.${m[3]}`;
      return t;
    }
    // "이름, 생년월일" 줄 단위 붙여넣기 파싱 (쉼표/탭 구분)
    function parseRoster(text) {
      return text
        .split(/\r?\n/)
        .map((l) => l.trim())
        .filter(Boolean)
        .map((line) => {
          const parts = line.split(/[,\t]/).map((p) => p.trim());
          return { name: parts[0] || '', birth: normalizeBirth(parts[1] || '') };
        })
        .filter((r) => r.name);
    }

    function nextCertNo(no) {
      const s = String(no);
      const m = s.match(/(\d+)(?!.*\d)/);
      if (!m) return s;
      const inc = String(parseInt(m[0], 10) + 1).padStart(m[0].length, '0');
      return s.slice(0, m.index) + inc + s.slice(m.index + m[0].length);
    }

        b = p ? b.replace(/\{PARTNER\}/g, p) : b.replace(/\{PARTNER\}와\s*/g, '').replace(/\{PARTNER\}/g, '');

      return json;
    }

      if (torgId) params.torgId = torgId;
      const j = await apiGet(params);
      const c = j.course || null;
      if (c && c.businessName) {
        // 사업명 표기 보정: HRD-Net govBusiNm → 증명서 표기명
        const BIZ_MAP = { '통합심사과정훈련': 'K-디지털 트레이닝 사업' };
        c.businessName = BIZ_MAP[c.businessName.trim()] || c.businessName;
      }
      return c;
    }
    // 과정 선택 시 수강생 명단 조회 (기관전용 조회로 이름·생년월일 실제 제공)
    async function loadRoster(trprId, degr, torgId) {
      if (isMock) { await delay(320); return MOCK_ROSTER[trprId] || []; }
      const params = { action: 'roster', trprId };
      if (degr) params.degr = degr;
      if (torgId) params.torgId = torgId;
      const j = await apiGet(params);
      return j.roster || [];
    }
    async function loadMeta() {
      if (isMock) { await delay(); return MOCK_META; }
      return await apiGet({ action: 'meta' });

    async function submitIssue(payload) {
      if (isMock) { await delay(650); return { ok: true, certNo: payload.certNo, seq: payload.seq }; }

    // 검색 가능한 드롭다운 (콤보박스): 과정/교육생 선택에 사용
    function Combobox({ value, options, onChange, placeholder, emptyText = '결과가 없습니다', loading, disabled, serverMode = false, onSearchChange }) {
      const [open, setOpen] = useState(false);
      const [q, setQ] = useState('');
      const [hi, setHi] = useState(0);
      const wrapRef = useRef(null);
      const selected = options.find((o) => o.value === value);

      useEffect(() => {
        const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', onDoc);
        return () => document.removeEventListener('mousedown', onDoc);
      }, []);

      // 서버사이드 검색 모드면 서버가 이미 필터한 결과를 그대로 노출(로컬 필터 생략)
      const filtered = serverMode
        ? options
        : (q.trim()
            ? options.filter((o) => (o.label + ' ' + (o.sub || '')).toLowerCase().includes(q.trim().toLowerCase()))
            : options);

      const choose = (o) => { onChange(o.value); setOpen(false); setQ(''); };
      const onKey = (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); setHi((h) => Math.min(h + 1, filtered.length - 1)); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); setHi((h) => Math.max(h - 1, 0)); }
        else if (e.key === 'Enter') { e.preventDefault(); if (filtered[hi]) choose(filtered[hi]); }
        else if (e.key === 'Escape') { setOpen(false); }
      };

      return (
        <div ref={wrapRef} className="relative">
          <button
            type="button" disabled={disabled}
            onClick={() => setOpen((o) => !o)}
            className={`${INPUT_CLS} flex items-center justify-between text-left ${disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'}`}
          >
            <span className={`truncate ${selected ? 'text-zinc-900' : 'text-zinc-400'}`}>{selected ? selected.label : placeholder}</span>
            <svg className={`ml-2 h-4 w-4 shrink-0 text-zinc-400 transition ${open ? 'rotate-180' : ''}`} viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M6 8l4 4 4-4" /></svg>
          </button>

          {open && !disabled && (
            <div className="panel-in absolute z-30 mt-2 w-full overflow-hidden rounded-xl border border-zinc-200 bg-white shadow-lg">
              <div className="border-b border-zinc-100 p-2">
                <input
                  autoFocus value={q}
                  onChange={(e) => { const v = e.target.value; setQ(v); setHi(0); if (onSearchChange) onSearchChange(v); }}
                  onKeyDown={onKey}
                  placeholder="검색…"
                  className="w-full rounded-lg bg-zinc-100 px-3 py-2 text-[14px] outline-none placeholder-zinc-400 focus:bg-zinc-50 focus:ring-2 focus:ring-apple-blue/20"
                />
              </div>
              <ul className="max-h-60 overflow-auto py-1">
                {loading ? (
                  <li className="px-3 py-3 text-[13px] text-zinc-400">{serverMode ? '검색 중…' : '불러오는 중…'}</li>
                ) : filtered.length ? (
                  filtered.map((o, i) => (
                    <li
                      key={o.value}
                      onMouseEnter={() => setHi(i)}
                      onMouseDown={(e) => { e.preventDefault(); choose(o); }}
                      className={`cursor-pointer px-3 py-2 ${i === hi ? 'bg-apple-blue/10' : ''}`}
                    >
                      <div className="text-[14px] text-zinc-900">{o.label}</div>
                      {o.sub && <div className="text-[12px] text-zinc-500 mt-0.5">{o.sub}</div>}
                    </li>
                  ))
                ) : (
                  <li className="px-3 py-3 text-[13px] text-zinc-400">{serverMode && q.trim().length < 2 ? '과정명을 두 글자 이상 입력하세요' : emptyText}</li>
                )}
              </ul>
            </div>
          )}
        </div>
      );
    }

    function Toasts({ items }) {
      return (

    // A4 미리보기를 컨테이너 폭에 맞춰 비율 유지 스케일
    function useScaleToFit(baseW) {
      const ref = useRef(null);
      const [scale, setScale] = useState(0.7);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const update = () => { const w = el.clientWidth; if (w) setScale(Math.min(1.3, w / baseW)); };
        update();
        const ro = new ResizeObserver(update);
        ro.observe(el);
        window.addEventListener('resize', update);
        return () => { ro.disconnect(); window.removeEventListener('resize', update); };
      }, [baseW]);
      return [ref, scale];
    }

    // ========================================================================
    // 🚀 App
    // ========================================================================
    function App() {
      const [typeKey, setTypeKey] = useState(CERT_TYPES[0].key);

      const [courses, setCourses] = useState([]);
      const [coursesLoading, setCoursesLoading] = useState(true);
      const [meta, setMeta] = useState(null);

      const [selectedCourseKey, setSelectedCourseKey] = useState('');
      const [course, setCourse] = useState({ name: '', businessName: '', partner: '', startDate: '', endDate: '', days: '', hours: '', institution: '한국전파진흥협회' });
      const [roster, setRoster] = useState([]);
      const [rosterLoading, setRosterLoading] = useState(false);
      const selTokenRef = useRef(0);                                 // 과정 선택 비동기 경쟁 가드

      const [pasted, setPasted] = useState([]);
      const [pasteOpen, setPasteOpen] = useState(false);
      const [pasteText, setPasteText] = useState('');

      const [name, setName] = useState('');
      const [birth, setBirth] = useState('');

      const [certNo, setCertNo] = useState('');
      const [seq, setSeq] = useState(null);
      const [issueDate, setIssueDate] = useState(todayStr());
      const [dept, setDept] = useState('AX·DX 교육센터');
      const [manager, setManager] = useState('');

      const [issuing, setIssuing] = useState(false);
      const [touched, setTouched] = useState(false);
      const [toasts, setToasts] = useState([]);

      const pushToast = useCallback((msg, variant = 'success') => {
        const id = Date.now() + Math.random();
        setToasts((t) => [...t, { id, msg, variant }]);
        setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 3200);
      }, []);

      // 초기 로드: 과정 목록(전체 ~30개) + 메타 — 실제/목 모두 마운트 시 1회 로드 후 로컬 필터
      useEffect(() => {
        let alive = true;
        (async () => {
          try {
            const cs = await loadCourses();
            if (!alive) return;
            setCourses(cs);
            if (cs.length) setSelectedCourseKey((prev) => prev || courseKey(cs[0])); // 즉시 미리보기가 차도록 첫 과정 자동선택
          } catch (e) {
            if (alive) pushToast('교육과정 목록을 불러오지 못했습니다', 'error');
          } finally {
            if (alive) setCoursesLoading(false);
          }
        })();
        (async () => {
          try {
            const m = await loadMeta();
            if (!alive) return;
            setMeta(m);
            if (m.nextCertNo) setCertNo(m.nextCertNo);
            if (m.nextSeq != null) setSeq(m.nextSeq);
            if (m.dept) setDept(m.dept);
          } catch (e) {
            if (alive) pushToast('발급 정보(번호)를 불러오지 못했습니다', 'error');
          }
        })();
        return () => { alive = false; };
      }, [pushToast]);

      // 과정 선택 시: 목록값으로 1차 채움 → 상세 보강 + 수강생 명단 조회(둘 다 trprId/degr/torgId 전달)
      // deps 는 selectedCourseKey 만 — courses 가 바뀔 때 재실행/재조회되는 것을 막는다(클로저로 최신 courses 참조).
      useEffect(() => {
        if (!selectedCourseKey) return;
        const c = courses.find((x) => courseKey(x) === selectedCourseKey);
        if (!c) return;
        const my = ++selTokenRef.current;

        // 1) 목록 항목으로 채움 (실제 모드 목록엔 일수/시간/사업명이 비어 있음)
        setCourse({
          name: c.name || '', businessName: c.businessName || '', partner: c.partner || '',
          startDate: c.startDate || '', endDate: c.endDate || '', days: c.days ?? '', hours: c.hours ?? '',
          institution: c.institution || '한국전파진흥협회',
        });

        // 2) 상세 조회로 일수/시간/사업명/담당자/기관 자동 채움 (목 모드는 null → 목록값 유지, 모두 편집 가능)
        (async () => {
          try {
            const d = await loadCourseDetail(c.id, c.degr, c.torgId);
            if (selTokenRef.current !== my || !d) return;
            setCourse((prev) => ({
              ...prev,
              days: pick(d.days, prev.days),
              hours: pick(d.hours, prev.hours),
              businessName: pick(d.businessName, prev.businessName),
              institution: pick(d.institution, prev.institution, '한국전파진흥협회'),
            }));
            if (d.manager) setManager((m) => m || d.manager); // 담당자 비어있을 때만 자동 채움
          } catch (e) {
            if (selTokenRef.current === my) pushToast('교육과정 상세를 불러오지 못했습니다', 'error');
          }
        })();

        // 3) 수강생 명단 조회 (목/실제 공통). 결과 있으면 '교육생 선택' 드롭다운 + 첫 명 자동 채움.
        setRosterLoading(true); setRoster([]);
        (async () => {
          try {
            const r = await loadRoster(c.id, c.degr, c.torgId);
            if (selTokenRef.current !== my) return;
            setRoster(r);
            if (r.length) { setName((n) => n || r[0].name); setBirth((b) => b || r[0].birth); }
          } catch (e) {
            if (selTokenRef.current === my) pushToast('교육생 명단을 불러오지 못했습니다', 'error');
          } finally {
            if (selTokenRef.current === my) setRosterLoading(false);
          }
        })();
      }, [selectedCourseKey]); // courses/pushToast 의도적 제외(클로저로 최신값 사용)

      const typeObj = useMemo(() => CERT_TYPES.find((t) => t.key === typeKey) || CERT_TYPES[0], [typeKey]);

      // 동명 과정 구분: 과정명 + (기간 · 회차)
      const courseOptions = useMemo(
        () => courses.map((c) => ({
          value: courseKey(c),
          label: c.name,
          sub: [(c.startDate && c.endDate) ? `${c.startDate}~${c.endDate}` : '', c.degr ? `${c.degr}회차` : '']
            .filter(Boolean).join(' · '),
        })),
        [courses]
      );
      const traineeSource = pasted.length ? pasted : roster;
      const traineeOptions = useMemo(
        () => traineeSource.map((p) => ({ value: p.name + '|' + p.birth, label: p.name, sub: [p.birth, p.status].filter(Boolean).join(' · ') })),
        [traineeSource]
      );
      const traineeValue = name ? name + '|' + normalizeBirth(birth) : '';

      // 표시용 파생값
      const period = course.startDate && course.endDate ? `${course.startDate}~${course.endDate}` : (course.startDate || course.endDate || '');
      const daysHours = (course.days !== '' || course.hours !== '') ? `(${course.days || '-'}일/${course.hours || '-'}시간)` : '';

      // 유효성
      const errors = {};
      if (!name.trim()) errors.name = '성명을 입력하세요';
      if (!birth.trim()) errors.birth = '생년월일을 입력하세요';
      if (!course.name.trim()) errors.course = '교육과정명을 입력하세요';
      if (!certNo.trim()) errors.certNo = '증명서 번호를 입력하세요';
      const canIssue = Object.keys(errors).length === 0 && !issuing;

      const setCourseField = (k, v) => setCourse((c) => ({ ...c, [k]: v }));

      const applyPaste = () => {
        const parsed = parseRoster(pasteText);
        if (!parsed.length) { pushToast('붙여넣은 명단에서 이름을 찾지 못했습니다', 'error'); return; }
        setPasted(parsed);
        pushToast(`명단 ${parsed.length}명을 불러왔습니다`);
      };
      const clearPaste = () => { setPasted([]); setPasteText(''); };

      const onSelectTrainee = (val) => {
        const idx = val.indexOf('|');
        setName(idx >= 0 ? val.slice(0, idx) : val);
        setBirth(idx >= 0 ? val.slice(idx + 1) : '');
      };

      const handleIssue = async () => {
        setTouched(true);
        if (Object.keys(errors).length) { pushToast('필수 항목을 확인해주세요', 'error'); return; }
        setIssuing(true);
        const payload = {
          seq, certNo: certNo.trim(), name: name.trim(), birth: normalizeBirth(birth),
          type: typeKey, courseName: course.name.trim(), dept: dept.trim(), manager: manager.trim(),
        };
        try {
          const res = await submitIssue(payload);
          // 서버가 락 안에서 확정한 실제 번호(동시 발급이 겹치면 서버가 조정함)
          const assignedNo = res && res.certNo;
          if (assignedNo && assignedNo !== payload.certNo) {
            // 동시 발급 충돌 → 화면·인쇄 번호를 서버가 실제 기록한 번호로 교정하고 재인쇄 안내
            setCertNo(assignedNo);
            if (res.seq != null) setSeq(res.seq);
            pushToast(`동시 발급이 감지되어 번호가 ${payload.certNo} → ${assignedNo} 로 조정되었습니다. 증명서를 다시 인쇄해주세요.`, 'error');
          } else {
            pushToast('시트에 기록되었습니다');
            // 다음 발급을 위해 번호 자동 증가 (실제 모드는 meta 재조회로 갱신)
            if (isMock) {
              setCertNo((no) => nextCertNo(no));
              setSeq((s) => (typeof s === 'number' ? s + 1 : s));
            } else {
              try {
                const m = await loadMeta();
                setMeta(m);
                if (m.nextCertNo) setCertNo(m.nextCertNo);
                if (m.nextSeq != null) setSeq(m.nextSeq);
              } catch (e) {
                setCertNo((no) => nextCertNo(no));
              }
            }
          }
        } catch (e) {
          pushToast(e.message || '기록 중 오류가 발생했습니다', 'error');
        } finally {
          setIssuing(false);
        }
      };

      const handlePrint = () => window.print();

      const [vpRef, scale] = useScaleToFit(794);

      const certData = {
        typeObj, certNo, name, birth: normalizeBirth(birth),
        courseName: course.name, businessName: course.businessName, partner: course.partner,
        period, daysHours, issueDateText: formatIssueDate(issueDate), institution: course.institution,
      };

      return (
        <div className="min-h-screen">
          <TopBar canIssue={canIssue} issuing={issuing} onIssue={handleIssue} onPrint={handlePrint} />

          <main className="mx-auto grid max-w-[1500px] grid-cols-1 gap-6 px-4 py-6 sm:px-6 lg:grid-cols-[minmax(0,1fr)_minmax(0,1fr)] lg:px-8">

            {/* ===== 좌: 컨트롤 패널 ===== */}
            <div className="no-print space-y-5">

              {/* 1. 증명서 종류 */}
              <Card step="1" title="증명서 종류" desc="발급할 증명서를 선택하세요">
                <div className="flex flex-wrap gap-2">
                  {CERT_TYPES.map((t) => {
                    const active = t.key === typeKey;
                    return (
                      <button
                        key={t.key} type="button" onClick={() => setTypeKey(t.key)}
                        className={`rounded-full border px-3.5 py-2 text-[14px] font-medium transition ${active ? 'border-apple-blue bg-apple-blue text-white shadow-sm' : 'border-zinc-300 bg-white text-zinc-700 hover:border-zinc-400 hover:bg-zinc-50'}`}
                      >
                        {t.key}
                        {t.isAward && <span className={`ml-1.5 rounded px-1 py-0.5 text-[10px] font-semibold ${active ? 'bg-white/20' : 'bg-amber-100 text-amber-700'}`}>상장</span>}
                      </button>
                    );
                  })}
                </div>
              </Card>

              {/* 2. 교육과정 */}
              <Card step="2" title="교육과정" desc="과정을 선택하면 정보가 자동으로 채워집니다 (수정 가능)">
                <Field label="과정 선택">
                  <Combobox
                    value={selectedCourseKey} options={courseOptions} onChange={setSelectedCourseKey}
                    placeholder={coursesLoading ? '불러오는 중…' : '교육과정을 검색·선택하세요'}
                    loading={coursesLoading} emptyText="과정이 없습니다"
                  />
                </Field>

                <div className="mt-4 grid grid-cols-1 gap-3">
                  <Field label="교육과정명" error={touched && errors.course}>
                    <TextInput value={course.name} onChange={(v) => setCourseField('name', v)} error={touched && errors.course} placeholder="예) 카카오테크 부트캠프 …" />
                  </Field>
                  <div className="grid grid-cols-2 gap-3">
                    <Field label="교육 시작일"><TextInput value={course.startDate} onChange={(v) => setCourseField('startDate', v)} placeholder="2026.05.12" /></Field>
                    <Field label="교육 종료일"><TextInput value={course.endDate} onChange={(v) => setCourseField('endDate', v)} placeholder="2026.11.17" /></Field>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <Field label="교육일수"><TextInput value={course.days} onChange={(v) => setCourseField('days', v)} placeholder="125" inputMode="numeric" /></Field>
                    <Field label="교육시간"><TextInput value={course.hours} onChange={(v) => setCourseField('hours', v)} placeholder="1000" inputMode="numeric" /></Field>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <Field label="사업명"><TextInput value={course.businessName} onChange={(v) => setCourseField('businessName', v)} placeholder="예) 디지털선도기업아카데미 사업" /></Field>
                    <Field label="파트너사" hint="본문 {PARTNER}에 사용">
                      <TextInput value={course.partner} onChange={(v) => setCourseField('partner', v)} placeholder={course.businessName ? `참고: ${course.businessName}` : '예) (주)카카오'} />
                    </Field>
                  </div>
                </div>
              </Card>

              {/* 3. 교육생 */}
              <Card step="3" title="교육생" desc="명단에서 선택하거나 직접 입력 / 붙여넣기">
                {traineeOptions.length > 0 ? (
                  <Field label={`교육생 선택${pasted.length ? ' (붙여넣은 명단)' : roster.length ? ` · ${roster.length}명` : ''}`} hint="명단에서 선택하면 성명·생년월일이 자동 입력됩니다">
                    <Combobox
                      value={traineeValue} options={traineeOptions} onChange={onSelectTrainee}
                      placeholder={rosterLoading ? '명단 불러오는 중…' : '교육생을 검색·선택하세요'}
                      loading={rosterLoading} emptyText="명단이 없습니다"
                    />
                  </Field>
                ) : (
                  <div className="rounded-xl border border-dashed border-zinc-300 bg-zinc-50 px-3.5 py-2.5 text-[13px] text-zinc-500">
                    {rosterLoading ? '명단을 불러오는 중…' : '조회된 수강생 명단이 없어 직접 입력합니다. 아래에 성명·생년월일을 입력하거나 명단을 붙여넣으세요.'}
                  </div>
                )}

                <div className="mt-4 grid grid-cols-2 gap-3">
                  <Field label="성명" error={touched && errors.name}>
                    <TextInput value={name} onChange={setName} error={touched && errors.name} placeholder="홍길동" />
                  </Field>
                  <Field label="생년월일" error={touched && errors.birth} hint={!(touched && errors.birth) ? '2000.01.01 / 20000101' : undefined}>
                    <TextInput value={birth} onChange={setBirth} error={touched && errors.birth} placeholder="2000.01.01" />
                  </Field>
                </div>

                {/* 명단 붙여넣기 */}
                <div className="mt-4 rounded-xl border border-zinc-200">
                  <button type="button" onClick={() => setPasteOpen((o) => !o)} className="flex w-full items-center justify-between px-3.5 py-2.5 text-[13.5px] font-medium text-zinc-700">
                    <span>명단 붙여넣기 {pasted.length > 0 && <span className="ml-1 text-apple-blue">· {pasted.length}명 적용됨</span>}</span>
                    <svg className={`h-4 w-4 text-zinc-400 transition ${pasteOpen ? 'rotate-180' : ''}`} viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M6 8l4 4 4-4" /></svg>
                  </button>
                  {pasteOpen && (
                    <div className="panel-in border-t border-zinc-100 p-3">
                      <textarea
                        value={pasteText} onChange={(e) => setPasteText(e.target.value)} rows={4}
                        placeholder={"한 줄에 한 명씩 (이름, 생년월일)\n홍길동, 2000.01.01\n김철수, 20000202"}
                        className="w-full resize-y rounded-lg border border-zinc-300 bg-white px-3 py-2 text-[13.5px] outline-none focus:border-apple-blue focus:ring-2 focus:ring-apple-blue/20"
                      />
                      <div className="mt-2 flex items-center gap-2">
                        <Button size="sm" variant="primary" onClick={applyPaste}>명단 적용</Button>
                        {pasted.length > 0 && <Button size="sm" variant="secondary" onClick={clearPaste}>지우기</Button>}
                        <span className="ml-auto text-[12px] text-zinc-400">쉼표 또는 탭으로 구분</span>
                      </div>
                    </div>
                  )}
                </div>
              </Card>

              {/* 4. 발급 정보 */}
              <Card step="4" title="발급 정보" desc="증명서 번호·발급일자·담당">
                <div className="grid grid-cols-1 gap-3">
                  <Field label="증명서 번호" error={touched && errors.certNo} hint={!(touched && errors.certNo) ? '발급 후 자동으로 다음 번호로 증가합니다' : undefined}>
                    <TextInput value={certNo} onChange={setCertNo} error={touched && errors.certNo} placeholder="RAPA26-AXDX-0338" />
                  </Field>
                  <div className="grid grid-cols-2 gap-3">
                    <Field label="발급일자">
                      <TextInput type="date" value={issueDate} onChange={setIssueDate} />
                    </Field>
                    <Field label="담당부서"><TextInput value={dept} onChange={setDept} placeholder="AX·DX 교육센터" /></Field>
                  </div>
                  <Field label="담당자">
                    <input
                      list="mgr-list" value={manager} onChange={(e) => setManager(e.target.value)}
                      placeholder="담당자명" className={INPUT_CLS}
                    />
                    <datalist id="mgr-list">
                      {(meta && meta.managers ? meta.managers : []).map((m) => <option key={m} value={m} />)}
                    </datalist>
                  </Field>
                </div>

                <div className="mt-5">
                  <Button variant="primary" size="lg" className="w-full" disabled={!canIssue} onClick={handleIssue}>
                    {issuing ? '기록 중…' : '발급 & 시트 기록'}
                  </Button>
                  {!canIssue && !issuing && (
                    <p className="mt-2 text-center text-[12px] text-zinc-400">성명 · 생년월일 · 교육과정명 · 번호를 입력하면 발급할 수 있어요</p>
                  )}
                </div>
              </Card>
            </div>

            {/* ===== 우: 실시간 미리보기 ===== */}
            <div className="lg:sticky lg:top-[84px] lg:self-start">
              <div className="no-print mb-3 flex items-center justify-between">
                <h2 className="text-[15px] font-semibold text-zinc-900">미리보기</h2>
                <span className="rounded-full bg-zinc-100 px-2.5 py-1 text-[11px] font-medium text-zinc-500">A4 · {typeObj.key}</span>
              </div>

              <div id="print-root">
                <div ref={vpRef} className="cert-viewport" style={{ height: 1123 * scale }}>
                  <div className="cert-scale" style={{ width: 794, transform: `scale(${scale})`, transformOrigin: 'top left' }}>
                    <Certificate data={certData} />
                  </div>
                </div>
              </div>

              <p className="no-print mt-3 text-center text-[12px] text-zinc-400">
                인쇄/PDF 저장 시 증명서만 깨끗하게 A4로 출력됩니다.
              </p>
            </div>
          </main>

          <Toasts items={toasts} />
        </div>
      );
    }

    // ========================================================================
    // ▶ 렌더링
    // ========================================================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
