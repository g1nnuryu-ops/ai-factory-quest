<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마음나눔 상담 게시판 · 익명 고민/칭찬</title>

  <!-- Tailwind (CDN, version-pinned) -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>

  <!-- ⚠️ 모든 CDN은 버전을 명시적으로 고정한다. 미고정 시 @babel/standalone 이
       최신(8.x)으로 올라가 type="text/babel" 인라인 변환이 통째로 깨진다.
       Babel 은 반드시 7.x 로 고정. React/ReactDOM 도 정확히 핀. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <!-- Pretendard 웹폰트 (공공기관 톤의 단정한 한글 폰트) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.min.css" />

  <script>
    // 공공기관(정부24/국민신문고) 톤 — 정부 블루/네이비 팔레트 + 단정한 폰트
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Pretendard"', '"Pretendard Variable"', '-apple-system', '"Apple SD Gothic Neo"', '"Noto Sans KR"', '"Malgun Gothic"', 'system-ui', 'sans-serif'],
          },
          colors: {
            // 서비스 프라이머리(정부 블루) ~ 네이비
            gov: {
              50:  '#eef3fb',
              100: '#d7e3f6',
              200: '#aec6ed',
              300: '#7ea3df',
              500: '#1A4FA0', // 프라이머리 블루
              600: '#16438a',
              700: '#10366f',
              900: '#0B2D5B', // 네이비
            },
          },
          boxShadow: {
            // 미세한 그림자 위주 (떠다니는 컬러 그림자 제거)
            card: '0 1px 2px 0 rgba(15, 23, 42, 0.04)',
            bar: '0 1px 0 0 rgba(15, 23, 42, 0.06)',
          },
        },
      },
    };
  </script>

  <style>
    html, body { height: 100%; }
    body {
      /* 그라데이션/파스텔 제거 — 아주 옅은 그레이 배경 */
      background-color: #F4F6F9;
    }

    /* 등장 애니메이션 (튀는 효과 제거, 절제된 페이드) */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.18s ease-out both; }

    /* 슬림 스크롤바 (그레이 톤) */
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    *::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    *::-webkit-scrollbar-track { background: transparent; }

    textarea { font-family: inherit; }
  </style>
</head>
<body class="text-gray-800 antialiased">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    // ========================================
    // 상수 · 데이터 모델 · 유틸
    // ========================================
    // 데이터는 전부 서버(DB)에서 관리. localStorage 는 "내가 공감한 글 id" 기억용으로만 사용.
    const EMPATHY_KEY = 'anon-board.empathized.v1';
    const API = ''; // 동일 출처 서버에서 서빙되므로 상대 경로 사용

    // 카테고리 정의 — 공공기관 톤(절제된 라벨/저채도)으로 한 곳에서 관리.
    //  · label/key 등 로직에 쓰이는 값은 그대로 유지
    //  · 색은 사각 배지(저채도), 리액션 문구는 격식 있는 "공감"으로 통일
    //  · icon: 배지/세그먼트에 쓰는 단색 아이콘 이름
    const CATEGORIES = {
      worry: {
        key: 'worry',
        label: '고민',
        icon: 'chat',
        // 고민 = 네이비/그레이 톤 사각 배지
        badge: 'bg-gov-50 text-gov-700 border border-gov-200',
        accent: 'before:bg-gov-500',
        reactionLabel: '공감',
        reactionActive: 'bg-gov-500 text-white border border-gov-500',
        reactionIdle: 'bg-white text-gov-700 border border-gov-200 hover:bg-gov-50',
      },
      praise: {
        key: 'praise',
        label: '칭찬',
        icon: 'check',
        // 칭찬 = 단정한 그린 톤 사각 배지 (저채도)
        badge: 'bg-emerald-50 text-emerald-700 border border-emerald-200',
        accent: 'before:bg-emerald-600',
        reactionLabel: '공감',
        reactionActive: 'bg-emerald-600 text-white border border-emerald-600',
        reactionIdle: 'bg-white text-emerald-700 border border-emerald-200 hover:bg-emerald-50',
      },
      support: {
        key: 'support',
        label: '응원',
        icon: 'thumb',
        // 응원 = 저채도 teal 톤 사각 배지 (앰버는 너무 튀어 공공 톤의 teal muted 채택)
        badge: 'bg-teal-50 text-teal-700 border border-teal-200',
        accent: 'before:bg-teal-600',
        reactionLabel: '공감',
        reactionActive: 'bg-teal-600 text-white border border-teal-600',
        reactionIdle: 'bg-white text-teal-700 border border-teal-200 hover:bg-teal-50',
      },
      suggest: {
        key: 'suggest',
        label: '건의',
        icon: 'doc',
        // 건의 = 슬레이트/그레이 톤 사각 배지
        badge: 'bg-slate-100 text-slate-700 border border-slate-300',
        accent: 'before:bg-slate-500',
        reactionLabel: '공감',
        reactionActive: 'bg-slate-600 text-white border border-slate-600',
        reactionIdle: 'bg-white text-slate-700 border border-slate-300 hover:bg-slate-50',
      },
    };
    const CATEGORY_ORDER = ['worry', 'praise', 'support', 'suggest'];

    // 단색 인라인 아이콘 (이모지 대신 절제된 SVG). currentColor 사용.
    const Icon = ({ name, className = 'h-4 w-4' }) => {
      const paths = {
        // 말풍선(고민/상담)
        chat: 'M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z',
        // 체크(칭찬/완료)
        check: 'M22 11.08V12a10 10 0 1 1-5.93-9.14 M22 4 12 14.01l-3-3',
        // 좋아요(공감) — 손
        thumb: 'M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3',
        // 목록(전체)
        list: 'M8 6h13 M8 12h13 M8 18h13 M3 6h.01 M3 12h.01 M3 18h.01',
        // 문서/안내
        doc: 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8',
        // 자물쇠(익명/보안)
        lock: 'M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z M7 11V7a5 5 0 0 1 10 0v4',
        // 안내 i
        info: 'M12 16v-4 M12 8h.01',
        // 새로고침(닉네임 재발급)
        refresh: 'M23 4v6h-6 M1 20v-6h6 M3.51 9a9 9 0 0 1 14.85-3.36L23 10 M1 14l4.64 4.36A9 9 0 0 0 20.49 15',
        // 펜(작성)
        pen: 'M12 20h9 M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z',
        // 아래 화살표(펼치기)
        chevron: 'M6 9l6 6 6-6',
      };
      const extra = name === 'info' ? <circle cx="12" cy="12" r="10" /> : null;
      return (
        <svg
          className={className}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          aria-hidden="true"
        >
          {extra}
          <path d={paths[name]} />
        </svg>
      );
    };

    // 익명 닉네임 생성 재료 (형용사 + 동물)
    const ADJECTIVES = [
      '용감한', '따뜻한', '조용한', '씩씩한', '엉뚱한', '다정한', '차분한', '반짝이는',
      '느긋한', '포근한', '솔직한', '신중한', '명랑한', '든든한', '상냥한', '호기심많은',
      '꿈꾸는', '단단한', '여유로운', '사려깊은',
    ];
    const ANIMALS = [
      '토끼', '곰', '여우', '고양이', '강아지', '판다', '수달', '다람쥐',
      '펭귄', '고슴도치', '햄스터', '코알라', '사슴', '부엉이', '물범', '너구리',
      '거북이', '두더지', '오리', '알파카',
    ];

    const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const randomNickname = () => `${pick(ADJECTIVES)} ${pick(ANIMALS)}`;

    // 상대 시간 포맷 ("방금 전", "3분 전" ...) — ms 타임스탬프 또는 ISO 문자열 모두 허용
    const formatRelativeTime = (ts) => {
      const ms = typeof ts === 'number' ? ts : new Date(ts).getTime();
      const diff = Date.now() - ms;
      const sec = Math.floor(diff / 1000);
      if (sec < 5) return '방금 전';
      if (sec < 60) return `${sec}초 전`;
      const min = Math.floor(sec / 60);
      if (min < 60) return `${min}분 전`;
      const hour = Math.floor(min / 60);
      if (hour < 24) return `${hour}시간 전`;
      const day = Math.floor(hour / 24);
      if (day < 7) return `${day}일 전`;
      const d = new Date(ms);
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${d.getFullYear()}.${mm}.${dd}`;
    };

    // ========================================
    // 🔌 API 헬퍼 (fetch 기반) — 모든 데이터는 서버(DB)에서
    // ========================================
    // 일관 응답 봉투 { success, data, message } 를 풀어서 data 만 반환, 실패 시 throw.
    async function apiFetch(path, options = {}) {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        ...options,
      });
      let json = null;
      try { json = await res.json(); } catch (_) { /* 본문 없음 */ }
      if (!res.ok || !json || json.success === false) {
        const msg = (json && json.message) || `요청 실패 (HTTP ${res.status})`;
        throw new Error(msg);
      }
      return json.data;
    }

    const api = {
      listPosts: (sort = 'latest') => apiFetch(`/api/posts?sort=${encodeURIComponent(sort)}`),
      createPost: (payload) => apiFetch('/api/posts', { method: 'POST', body: JSON.stringify(payload) }),
      empathize: (id) => apiFetch(`/api/posts/${id}/empathy`, { method: 'POST' }),
      unempathize: (id) => apiFetch(`/api/posts/${id}/empathy`, { method: 'DELETE' }),
      addReply: (id, payload) => apiFetch(`/api/posts/${id}/replies`, { method: 'POST', body: JSON.stringify(payload) }),
    };

    // ----------------------------------------
    // "내가 공감한 글 id" 집합 — 익명이라 서버가 사용자 식별 못 하므로
    // 눌림 상태 표시/토글용으로만 localStorage 에 보관.
    // ----------------------------------------
    const loadEmpathized = () => {
      try {
        const raw = localStorage.getItem(EMPATHY_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        return new Set(Array.isArray(arr) ? arr.map(String) : []);
      } catch (_) {
        return new Set();
      }
    };
    const saveEmpathized = (set) => {
      try { localStorage.setItem(EMPATHY_KEY, JSON.stringify([...set])); } catch (_) {}
    };

    // ========================================
    // 🎨 디자인 시스템 컴포넌트 (순수 프레젠테이션)
    // ========================================

    function Button({ variant = 'primary', size = 'md', className = '', disabled = false, children, ...rest }) {
      // 직사각형에 가까운 작은 라운드, 솔리드 블루 / 아웃라인 보조
      const base = 'inline-flex items-center justify-center gap-1.5 rounded-md font-semibold transition-colors duration-150 focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-gov-500 disabled:opacity-50 disabled:cursor-not-allowed';
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2 text-sm',
        lg: 'px-6 py-2.5 text-base',
      };
      const variants = {
        primary: 'bg-gov-500 text-white hover:bg-gov-600',
        secondary: 'bg-white text-gov-700 border border-gov-300 hover:bg-gov-50',
        ghost: 'bg-transparent text-gray-600 hover:bg-gray-100',
        danger: 'bg-transparent text-red-600 border border-red-200 hover:bg-red-50',
      };
      return (
        <button
          className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}
          disabled={disabled}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Textarea({ className = '', ...rest }) {
      return (
        <textarea
          className={`w-full resize-y rounded-md border border-gray-300 bg-white px-3.5 py-2.5 text-[15px] leading-relaxed text-gray-800 placeholder-gray-400 outline-none transition focus:border-gov-500 focus:ring-2 focus:ring-gov-100 ${className}`}
          {...rest}
        />
      );
    }

    function Card({ className = '', children, ...rest }) {
      // 떠다니는 카드 → 보더로 구분되는 단정한 카드 + 아주 미세한 그림자
      return (
        <div
          className={`rounded-md bg-white border border-gray-200 shadow-card ${className}`}
          {...rest}
        >
          {children}
        </div>
      );
    }

    function Badge({ category, className = '' }) {
      const c = CATEGORIES[category];
      // 사각(약한 라운드) 저채도 배지
      return (
        <span className={`inline-flex items-center gap-1 rounded-sm px-2 py-0.5 text-xs font-semibold ${c.badge} ${className}`}>
          <Icon name={c.icon} className="h-3.5 w-3.5" />
          {c.label}
        </span>
      );
    }

    // 익명 닉네임 앞에 붙는 작은 아바타 — 저채도 그레이/블루 톤, 사각(약한 라운드)
    function Avatar({ nickname, size = 'md' }) {
      const palette = [
        'bg-gov-100 text-gov-700', 'bg-slate-100 text-slate-600',
        'bg-emerald-50 text-emerald-700', 'bg-gov-50 text-gov-600',
        'bg-gray-100 text-gray-600', 'bg-slate-200 text-slate-700',
      ];
      let sum = 0;
      for (let i = 0; i < nickname.length; i++) sum += nickname.charCodeAt(i);
      const cls = palette[sum % palette.length];
      const initial = nickname.trim().charAt(0) || '익';
      const dim = size === 'sm' ? 'h-7 w-7 text-xs' : 'h-9 w-9 text-sm';
      return (
        <span className={`flex shrink-0 items-center justify-center rounded-md font-bold ${dim} ${cls}`} aria-hidden="true">
          {initial}
        </span>
      );
    }

    // ========================================
    // 🧩 레이아웃 / 공통 컴포넌트
    // ========================================

    // 상단 유틸리티 바 — 공공 서비스다운 얇은 안내 줄
    function UtilityBar() {
      return (
        <div className="border-b border-gray-200 bg-white">
          <div className="mx-auto flex max-w-3xl items-center justify-between px-4 py-1.5 text-[11px] text-gray-500 sm:text-xs">
            <span>마음건강 통합 상담 서비스</span>
            <span className="inline-flex items-center gap-1">
              <Icon name="lock" className="h-3 w-3" />
              익명 운영
            </span>
          </div>
        </div>
      );
    }

    // GNB 헤더 — 좌측 엠블럼(플레이스홀더) + 서비스명 + 한 줄 안내
    function Header() {
      return (
        <header className="border-b border-gray-200 bg-white shadow-bar">
          <UtilityBar />
          <div className="mx-auto flex max-w-3xl items-center gap-3 px-4 py-4">
            {/* 공식 마크/엠블럼 placeholder */}
            <div
              className="flex h-11 w-11 shrink-0 items-center justify-center rounded-md bg-gov-900 text-white"
              aria-hidden="true"
            >
              <Icon name="chat" className="h-6 w-6" />
            </div>
            <div className="min-w-0">
              <h1 className="text-lg font-bold tracking-tight text-gov-900 sm:text-xl">
                마음나눔 상담 게시판
              </h1>
              <p className="mt-0.5 truncate text-xs text-gray-500 sm:text-sm">
                고민·칭찬·응원·건의를 익명으로 등록하고 함께 나누는 공간입니다.
              </p>
            </div>
          </div>
        </header>
      );
    }

    // 개인정보·익명 안내 박스 (공공 서비스 안내 톤)
    function NoticeBox() {
      return (
        <div
          className="flex items-start gap-2 rounded-md border border-gov-200 bg-gov-50 px-3.5 py-2.5 text-xs leading-relaxed text-gov-700 sm:text-[13px]"
          role="note"
        >
          <Icon name="info" className="mt-0.5 h-4 w-4 shrink-0 text-gov-500" />
          <p>
            모든 게시글과 답글은 <b className="font-semibold">익명</b>으로 등록되며, 작성 내용은
            서버에 안전하게 저장되어 다른 이용자와 함께 공유됩니다. 개인정보가 포함되지 않도록 유의해 주시기 바랍니다.
          </p>
        </div>
      );
    }

    // 필터 탭 — 전체 / 고민 / 칭찬 / 응원 / 건의. 언더라인 세그먼트 탭 (게시판 톤)
    function FilterTabs({ active, onChange, counts }) {
      const tabs = [
        { key: 'all', label: '전체', icon: 'list' },
        ...CATEGORY_ORDER.map((k) => ({ key: k, label: CATEGORIES[k].label, icon: CATEGORIES[k].icon })),
      ];
      return (
        <div
          className="flex flex-wrap border-b border-gray-200"
          role="tablist"
          aria-label="게시글 분류 필터"
        >
          {tabs.map((t) => {
            const isActive = active === t.key;
            return (
              <button
                key={t.key}
                role="tab"
                aria-selected={isActive}
                onClick={() => onChange(t.key)}
                className={`-mb-px flex items-center justify-center gap-1.5 border-b-2 px-4 py-2.5 text-sm font-semibold transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-gov-500 ${
                  isActive
                    ? 'border-gov-500 text-gov-700'
                    : 'border-transparent text-gray-500 hover:text-gray-800'
                }`}
              >
                <Icon name={t.icon} className="h-4 w-4" />
                <span>{t.label}</span>
                <span
                  className={`ml-0.5 inline-flex min-w-[1.25rem] items-center justify-center rounded-sm px-1 py-0.5 text-[11px] font-bold ${
                    isActive ? 'bg-gov-100 text-gov-700' : 'bg-gray-100 text-gray-500'
                  }`}
                >
                  {counts[t.key]}
                </span>
              </button>
            );
          })}
        </div>
      );
    }

    // ========================================
    // ✍️ 글 작성 폼 (인라인, 익명 닉네임 자동 생성)
    // ========================================
    function PostComposer({ onSubmit }) {
      const [category, setCategory] = useState('worry');
      const [content, setContent] = useState('');
      const [nickname, setNickname] = useState(randomNickname);
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState('');
      const taRef = useRef(null);

      const reroll = useCallback(() => setNickname(randomNickname()), []);

      const canSubmit = content.trim().length > 0 && !submitting;

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!canSubmit) return;
        setSubmitting(true);
        setError('');
        try {
          // onSubmit 은 비동기(서버 저장). 성공해야 폼을 초기화한다.
          await onSubmit({ category, content: content.trim(), nickname });
          setContent('');
          setNickname(randomNickname());
          if (taRef.current) taRef.current.focus();
        } catch (err) {
          setError(err.message || '등록에 실패했습니다. 잠시 후 다시 시도해 주세요.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <Card className="fade-up overflow-hidden">
          {/* 섹션 제목 줄 */}
          <div className="flex items-center gap-2 border-b border-gray-200 bg-gray-50 px-4 py-2.5">
            <Icon name="pen" className="h-4 w-4 text-gov-500" />
            <h2 className="text-sm font-bold text-gray-800">새 글 작성</h2>
          </div>

          <form onSubmit={handleSubmit} className="p-4 sm:p-5">
            {/* 카테고리 선택 — 사각 세그먼트 */}
            <fieldset className="mb-4">
              <legend className="mb-1.5 text-xs font-semibold text-gray-600">분류 선택</legend>
              <div className="inline-flex flex-wrap overflow-hidden rounded-md border border-gray-300">
                {CATEGORY_ORDER.map((key, i) => {
                  const c = CATEGORIES[key];
                  const selected = category === c.key;
                  return (
                    <button
                      key={c.key}
                      type="button"
                      onClick={() => setCategory(c.key)}
                      aria-pressed={selected}
                      className={`flex items-center gap-1.5 px-4 py-1.5 text-sm font-semibold transition-colors ${
                        i > 0 ? 'border-l border-gray-300' : ''
                      } ${
                        selected
                          ? 'bg-gov-500 text-white'
                          : 'bg-white text-gray-600 hover:bg-gray-50'
                      }`}
                    >
                      <Icon name={c.icon} className="h-4 w-4" />
                      {c.label}
                    </button>
                  );
                })}
              </div>
            </fieldset>

            {/* 익명 닉네임 표시 + 재발급 */}
            <div className="mb-3 flex items-center gap-2 rounded-md border border-gray-200 bg-gray-50 px-3 py-2 text-sm text-gray-600">
              <Avatar nickname={nickname} size="sm" />
              <span>
                작성자(익명): <b className="font-semibold text-gray-800">{nickname}</b>
              </span>
              <button
                type="button"
                onClick={reroll}
                className="ml-auto inline-flex items-center gap-1 rounded-md border border-gray-300 bg-white px-2 py-1 text-xs font-semibold text-gov-700 hover:bg-gov-50"
                title="다른 익명 이름으로 재발급"
              >
                <Icon name="refresh" className="h-3.5 w-3.5" /> 이름 재발급
              </button>
            </div>

            <label htmlFor="composer-content" className="mb-1.5 block text-xs font-semibold text-gray-600">
              내용 입력
            </label>
            <Textarea
              id="composer-content"
              ref={taRef}
              rows={4}
              maxLength={500}
              value={content}
              onChange={(e) => setContent(e.target.value)}
              placeholder={{
                worry: '고민 내용을 입력해 주세요. (개인정보가 포함되지 않도록 유의해 주세요.)',
                praise: '칭찬하거나 나누고 싶은 내용을 입력해 주세요.',
                support: '응원의 한마디를 익명으로 남겨 주세요.',
                suggest: '건의하실 내용을 입력해 주세요.',
              }[category]}
            />

            {error && (
              <p className="mt-3 rounded-md border border-red-200 bg-red-50 px-3 py-2 text-xs text-red-700" role="alert">
                {error}
              </p>
            )}

            <div className="mt-3 flex items-center justify-between">
              <span className="text-xs text-gray-400">
                <span className="tabular-nums">{content.length}</span>/500자 · 익명 등록
              </span>
              <Button type="submit" disabled={!canSubmit} size="md">
                <Icon name="pen" className="h-4 w-4" /> {submitting ? '등록 중…' : '등록'}
              </Button>
            </div>
          </form>
        </Card>
      );
    }

    // ========================================
    // 💬 답글 영역 (펼치기/접기 + 익명 작성, DB 저장)
    // ========================================
    function ReplySection({ replies, onAddReply }) {
      const list = Array.isArray(replies) ? replies : [];
      const [text, setText] = useState('');
      const [nickname] = useState(randomNickname);
      const [submitting, setSubmitting] = useState(false);
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        const trimmed = text.trim();
        if (!trimmed || submitting) return;
        setSubmitting(true);
        setError('');
        try {
          await onAddReply(trimmed, nickname);
          setText('');
        } catch (err) {
          setError(err.message || '답글 등록에 실패했습니다.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div className="mt-4 border-t border-gray-200 pt-3 fade-up">
          <h4 className="mb-2 text-xs font-bold text-gray-600">
            답글 <span className="tabular-nums text-gov-700">{list.length}</span>
          </h4>

          {/* 답글 목록 — 게시판 행 스타일 */}
          {list.length > 0 ? (
            <ul className="divide-y divide-gray-100 border-y border-gray-100">
              {list.map((cm) => (
                <li key={cm.id} className="flex items-start gap-2.5 py-2.5">
                  <Avatar nickname={cm.nickname} size="sm" />
                  <div className="min-w-0 flex-1">
                    <div className="flex items-center gap-2">
                      <span className="text-xs font-semibold text-gray-700">{cm.nickname}</span>
                      <span className="text-[11px] text-gray-400">{formatRelativeTime(cm.created_at)}</span>
                    </div>
                    <p className="mt-0.5 whitespace-pre-wrap break-words text-sm leading-relaxed text-gray-700">
                      {cm.content}
                    </p>
                  </div>
                </li>
              ))}
            </ul>
          ) : (
            <p className="rounded-md border border-dashed border-gray-200 bg-gray-50 px-3 py-2.5 text-sm text-gray-400">
              등록된 답글이 없습니다. 첫 답글을 남겨 보세요.
            </p>
          )}

          {/* 답글 작성 폼 */}
          <form onSubmit={handleSubmit} className="mt-3 flex items-stretch gap-2">
            <input
              type="text"
              value={text}
              onChange={(e) => setText(e.target.value)}
              maxLength={300}
              placeholder={`${nickname}(으)로 답글을 입력하세요`}
              className="min-w-0 flex-1 rounded-md border border-gray-300 bg-white px-3.5 py-2 text-sm text-gray-800 placeholder-gray-400 outline-none transition focus:border-gov-500 focus:ring-2 focus:ring-gov-100"
              aria-label="익명 답글 입력"
            />
            <Button type="submit" size="sm" variant="primary" disabled={!text.trim() || submitting}>
              {submitting ? '등록 중…' : '답글 등록'}
            </Button>
          </form>
          {error && (
            <p className="mt-2 text-xs text-red-600" role="alert">{error}</p>
          )}
        </div>
      );
    }

    // ========================================
    // 📄 게시글 카드
    // ========================================
    function PostCard({ post, reacted, onReact, onAddReply }) {
      const [showReplies, setShowReplies] = useState(false);
      const c = CATEGORIES[post.category] || CATEGORIES.worry;
      const replyCount = post.reply_count != null ? post.reply_count : (post.replies ? post.replies.length : 0);

      const handleReact = () => onReact(post.id, reacted);

      return (
        <Card
          className={`fade-up relative overflow-hidden p-4 sm:p-5 before:absolute before:left-0 before:top-0 before:h-full before:w-1 ${c.accent}`}
        >
          {/* 헤더: 배지 · 아바타 · 닉네임 · 시간 (공지/민원 게시판 정렬) */}
          <div className="mb-2.5 flex items-center gap-2.5">
            <Avatar nickname={post.nickname} size="sm" />
            <div className="min-w-0">
              <div className="truncate text-sm font-semibold text-gray-800">{post.nickname}</div>
              <div className="text-xs text-gray-400">{formatRelativeTime(post.created_at)}</div>
            </div>
            <div className="ml-auto">
              <Badge category={post.category} />
            </div>
          </div>

          {/* 본문 */}
          <p className="whitespace-pre-wrap break-words text-[15px] leading-relaxed text-gray-700">
            {post.content}
          </p>

          {/* 액션 바: 공감 + 답글 토글 */}
          <div className="mt-4 flex items-center gap-2 border-t border-gray-100 pt-3">
            <button
              onClick={handleReact}
              aria-pressed={reacted}
              aria-label={`이 글에 공감 (현재 ${post.empathy_count}명)`}
              className={`inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 text-sm font-semibold transition-colors ${
                reacted ? c.reactionActive : c.reactionIdle
              }`}
            >
              <Icon name="thumb" className="h-4 w-4" />
              {c.reactionLabel}
              <span className="tabular-nums">{post.empathy_count}</span>
            </button>

            <button
              onClick={() => setShowReplies((s) => !s)}
              className="inline-flex items-center gap-1.5 rounded-md border border-gray-200 px-3 py-1.5 text-sm font-semibold text-gray-600 transition-colors hover:bg-gray-50"
              aria-expanded={showReplies}
            >
              <Icon name="chat" className="h-4 w-4" />
              답글
              <span className="tabular-nums">{replyCount}</span>
              <Icon
                name="chevron"
                className={`h-4 w-4 transition-transform ${showReplies ? 'rotate-180' : ''}`}
              />
            </button>
          </div>

          {/* 답글 영역 */}
          {showReplies && (
            <ReplySection
              replies={post.replies}
              onAddReply={(content, nickname) => onAddReply(post.id, content, nickname)}
            />
          )}
        </Card>
      );
    }

    // 빈 상태 안내 — 단정한 안내 박스 (아이콘 + 안내문)
    function EmptyState({ filter }) {
      const map = {
        all: { title: '등록된 게시글이 없습니다', desc: '상단의 새 글 작성에서 고민·칭찬·응원·건의를 익명으로 등록해 주세요.' },
        worry: { title: '등록된 고민 게시글이 없습니다', desc: '고민이 있으시다면 익명으로 등록하여 함께 이야기를 나눠 보세요.' },
        praise: { title: '등록된 칭찬 게시글이 없습니다', desc: '나누고 싶은 칭찬이 있으시다면 익명으로 등록해 주세요.' },
        support: { title: '등록된 응원 게시글이 없습니다', desc: '서로에게 힘이 되는 응원의 한마디를 익명으로 남겨 주세요.' },
        suggest: { title: '등록된 건의 게시글이 없습니다', desc: '개선을 위한 건의 사항이 있으시다면 익명으로 등록해 주세요.' },
      };
      const e = map[filter] || map.all;
      return (
        <div className="fade-up flex flex-col items-center justify-center rounded-md border border-dashed border-gray-300 bg-white px-6 py-14 text-center">
          <div className="mb-3 flex h-12 w-12 items-center justify-center rounded-md bg-gray-100 text-gray-400">
            <Icon name="doc" className="h-6 w-6" />
          </div>
          <h3 className="text-base font-semibold text-gray-700">{e.title}</h3>
          <p className="mt-1.5 max-w-xs text-sm leading-relaxed text-gray-500">{e.desc}</p>
        </div>
      );
    }

    function Footer() {
      return (
        <footer className="mt-8 border-t border-gray-200 bg-white">
          <div className="mx-auto max-w-3xl px-4 py-6 text-xs leading-relaxed text-gray-500">
            <p className="font-semibold text-gray-700">마음나눔 상담 게시판</p>
            <p className="mt-1">
              본 게시판의 모든 글과 답글은 익명으로 운영되며, 작성 내용은 서버에 저장되어 이용자 간에 공유됩니다.
            </p>
            <p className="mt-1">서로를 존중하는 표현을 사용해 주시기 바랍니다.</p>
          </div>
        </footer>
      );
    }

    // 정렬 컨트롤 — 최신순 / 공감순. 단정한 사각 세그먼트(공공 톤)
    function SortControl({ value, onChange }) {
      const opts = [
        { key: 'latest', label: '최신순' },
        { key: 'empathy', label: '공감순' },
      ];
      return (
        <div
          className="inline-flex overflow-hidden rounded-md border border-gray-300"
          role="group"
          aria-label="게시글 정렬"
        >
          {opts.map((o, i) => {
            const selected = value === o.key;
            return (
              <button
                key={o.key}
                type="button"
                onClick={() => onChange(o.key)}
                aria-pressed={selected}
                className={`px-3 py-1.5 text-xs font-semibold transition-colors ${
                  i > 0 ? 'border-l border-gray-300' : ''
                } ${selected ? 'bg-gov-500 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}`}
              >
                {o.label}
              </button>
            );
          })}
        </div>
      );
    }

    // ========================================
    // 🚀 App — 상태와 비즈니스 로직 보유 (모든 데이터는 서버/DB)
    // ========================================
    function App() {
      const [posts, setPosts] = useState([]);
      const [filter, setFilter] = useState('all'); // all | worry | praise | support | suggest
      const [sort, setSort] = useState('latest'); // latest | empathy
      const [loading, setLoading] = useState(true);
      const [loadError, setLoadError] = useState('');

      // "내가 공감한 글 id" 집합 — localStorage 에만 보관(눌림 상태/토글용)
      const [reactedSet, setReactedSet] = useState(loadEmpathized);

      // 상대 시간을 주기적으로 갱신 (1분마다 "방금 전" → "1분 전")
      const [, forceTick] = useState(0);
      useEffect(() => {
        const t = setInterval(() => forceTick((n) => n + 1), 60 * 1000);
        return () => clearInterval(t);
      }, []);

      // 서버에서 목록 로드 (sort 변경 시 재조회)
      const reload = useCallback(async (sortKey) => {
        setLoading(true);
        setLoadError('');
        try {
          const data = await api.listPosts(sortKey);
          setPosts(Array.isArray(data) ? data : []);
        } catch (err) {
          setLoadError(err.message || '게시글을 불러오지 못했습니다.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { reload(sort); }, [sort, reload]);

      // 글 추가 — 서버 저장 후 응답을 맨 앞에 prepend. (PostComposer 가 await)
      const addPost = useCallback(async ({ category, content, nickname }) => {
        const created = await api.createPost({ category, content, nickname });
        // 공감순 정렬 중이면 새 글(공감 0)은 맨 아래라 정확한 위치 위해 재조회,
        // 최신순이면 맨 앞에 끼워넣어 즉시 반영.
        setSort((s) => {
          if (s === 'latest') {
            setPosts((prev) => [created, ...prev]);
          } else {
            reload('empathy');
          }
          return s;
        });
      }, [reload]);

      // 공감 토글 — 낙관적 업데이트 + localStorage 집합 갱신, 실패 시 롤백
      const toggleReaction = useCallback(async (postId, currentlyReacted) => {
        const idStr = String(postId);
        const delta = currentlyReacted ? -1 : 1;

        // 낙관적 반영
        setReactedSet((prev) => {
          const next = new Set(prev);
          if (currentlyReacted) next.delete(idStr); else next.add(idStr);
          saveEmpathized(next);
          return next;
        });
        setPosts((prev) =>
          prev.map((p) =>
            String(p.id) === idStr
              ? { ...p, empathy_count: Math.max((p.empathy_count || 0) + delta, 0) }
              : p
          )
        );

        try {
          const updated = currentlyReacted
            ? await api.unempathize(postId)
            : await api.empathize(postId);
          // 서버의 정확한 카운트로 동기화
          setPosts((prev) =>
            prev.map((p) => (String(p.id) === idStr ? { ...p, empathy_count: updated.empathy_count } : p))
          );
        } catch (err) {
          // 롤백
          setReactedSet((prev) => {
            const next = new Set(prev);
            if (currentlyReacted) next.add(idStr); else next.delete(idStr);
            saveEmpathized(next);
            return next;
          });
          setPosts((prev) =>
            prev.map((p) =>
              String(p.id) === idStr
                ? { ...p, empathy_count: Math.max((p.empathy_count || 0) - delta, 0) }
                : p
            )
          );
          console.warn('공감 처리 실패:', err.message);
        }
      }, []);

      // 답글 추가 — 서버 저장 후 해당 글의 replies 에 append. (ReplySection 이 await)
      const addReply = useCallback(async (postId, content, nickname) => {
        const created = await api.addReply(postId, { content, nickname });
        setPosts((prev) =>
          prev.map((p) => {
            if (String(p.id) !== String(postId)) return p;
            const replies = Array.isArray(p.replies) ? [...p.replies, created] : [created];
            return { ...p, replies, reply_count: (p.reply_count || 0) + 1 };
          })
        );
      }, []);

      // 탭별 개수 (4종 + 전체)
      const counts = useMemo(() => {
        const base = { all: posts.length, worry: 0, praise: 0, support: 0, suggest: 0 };
        for (const p of posts) if (base[p.category] != null) base[p.category] += 1;
        return base;
      }, [posts]);

      // 필터 적용 (정렬은 서버가 처리)
      const visiblePosts = useMemo(
        () => (filter === 'all' ? posts : posts.filter((p) => p.category === filter)),
        [posts, filter]
      );

      return (
        <div className="flex min-h-full flex-col">
          <Header />

          <main className="mx-auto w-full max-w-3xl flex-1 px-4 py-5">
            {/* 개인정보 · 익명 안내 */}
            <NoticeBox />

            {/* 작성 폼 */}
            <div className="mt-4">
              <PostComposer onSubmit={addPost} />
            </div>

            {/* 목록 헤더 + 필터 탭 + 정렬 */}
            <section className="mt-6" aria-label="게시글 목록">
              <div className="mb-2 flex items-end justify-between gap-3">
                <h2 className="text-base font-bold text-gray-800">게시글 목록</h2>
                <div className="flex items-center gap-3">
                  <span className="text-xs text-gray-500">
                    총 <span className="font-semibold tabular-nums text-gov-700">{counts.all}</span>건
                  </span>
                  <SortControl value={sort} onChange={setSort} />
                </div>
              </div>
              <FilterTabs active={filter} onChange={setFilter} counts={counts} />

              {/* 피드 */}
              <div className="mt-4 space-y-3" aria-live="polite">
                {loading ? (
                  <div className="fade-up flex items-center justify-center gap-2 rounded-md border border-dashed border-gray-300 bg-white px-6 py-14 text-sm text-gray-500">
                    <Icon name="refresh" className="h-4 w-4 animate-spin" />
                    게시글을 불러오는 중입니다…
                  </div>
                ) : loadError ? (
                  <div className="fade-up flex flex-col items-center justify-center rounded-md border border-red-200 bg-red-50 px-6 py-12 text-center" role="alert">
                    <p className="text-sm font-semibold text-red-700">{loadError}</p>
                    <p className="mt-1 text-xs text-red-600">서버 또는 네트워크 상태를 확인해 주세요.</p>
                    <button
                      onClick={() => reload(sort)}
                      className="mt-3 inline-flex items-center gap-1.5 rounded-md border border-red-300 bg-white px-3 py-1.5 text-xs font-semibold text-red-700 hover:bg-red-50"
                    >
                      <Icon name="refresh" className="h-3.5 w-3.5" /> 다시 시도
                    </button>
                  </div>
                ) : visiblePosts.length > 0 ? (
                  visiblePosts.map((post) => (
                    <PostCard
                      key={post.id}
                      post={post}
                      reacted={reactedSet.has(String(post.id))}
                      onReact={toggleReaction}
                      onAddReply={addReply}
                    />
                  ))
                ) : (
                  <EmptyState filter={filter} />
                )}
              </div>
            </section>
          </main>

          <Footer />
        </div>
      );
    }

    // ========================================
    // 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
